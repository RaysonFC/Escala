function localSearch(q){
  const w=q.toLowerCase().split(" ").filter(Boolean);
  return LOCAL_DB.filter(l=>w.some(x=>l.titulo.toLowerCase().includes(x)||l.artista.toLowerCase().includes(x)));
}

/* ── Busca YouTube via oEmbed (sem API key, sem CORS) ── */
async function ytSearch(q){
  // Tenta YouTube Data API primeiro
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q+" louvor gospel")}&type=video&maxResults=8&key=${YT_API_KEY}&regionCode=BR`);
    const d=await r.json();
    if(d.items&&d.items.length){
      return d.items.map(it=>({
        titulo:it.snippet.title,
        artista:it.snippet.channelTitle,
        ytId:it.id.videoId,
        ytUrl:"https://www.youtube.com/watch?v="+it.id.videoId,
        tom:"",cifra:"",obs:""
      }));
    }
  }catch(e){}
  // Fallback: banco local
  const loc=localSearch(q);
  if(loc.length) return loc.map(l=>({...l,ytId:getYTId(l.ytUrl),obs:""}));
  return [];
}

const emojiClass=(instrumento,emoji)=>{
  if(!instrumento&&!emoji) return "emoji-default";
  const s=(instrumento||"").toLowerCase();
  if(s.includes("bater")||s.includes("drum")) return "emoji-drum";
  if(s.includes("guitar")||s.includes("viola")||s.includes("baixo")||s.includes("contra")) return s.includes("baixo")||s.includes("contra")?"emoji-bass":"emoji-guitar";
  if(s.includes("teclado")||s.includes("piano")||s.includes("key")) return "emoji-keys";
  if(s.includes("voz")||s.includes("vocal")||s.includes("cant")) return "emoji-singer";
  const e=emoji||"";
  if(["🥁","🪘"].some(x=>e.includes(x))) return "emoji-drum";
  if(["🎸","🪕","🎻"].some(x=>e.includes(x))) return "emoji-guitar";
  if(["🎹","🎛","🎚"].some(x=>e.includes(x))) return "emoji-keys";
  if(["🎤","🎧","🎙"].some(x=>e.includes(x))) return "emoji-singer";
  if(["🎵","🎶"].some(x=>e.includes(x))) return "emoji-bass";
  return "emoji-default";
};

function TelaAcesso({onOk}){
  const [perfil,setPerfil]=React.useState(null); // "cantor" | "musico"
  const [pw,setPw]=React.useState("");
  const [nomeCantor,setNomeCantor]=React.useState("");
  const [err,setErr]=React.useState(false);
  const [errNome,setErrNome]=React.useState(false);
  const [show,setShow]=React.useState(false);
  const bg="#0F0F1A", card="#161625", border="rgba(255,255,255,0.07)";

  const NOMES_CANTORES=["Débora","Mariana","Alessandra","Uesley"];
  const tentar=()=>{
    // Cantor: valida nome + senha
    if(perfil==="cantor"){
      if(!nomeCantor.trim()){ setErrNome(true); setTimeout(()=>setErrNome(false),1200); return; }
      const nomeValido=NOMES_CANTORES.find(n=>n.toLowerCase()===nomeCantor.trim().toLowerCase());
      if(!nomeValido){ setErrNome(true); setTimeout(()=>setErrNome(false),1200); return; }
      const usuario=USUARIOS.find(u=>u.tipo==="cantor"&&u.senha===pw);
      if(usuario){
        const session={role:usuario.role, nome:nomeValido, perfil};
        saveSession(session);
        onOk(session);
      } else {
        setErr(true); setPw(""); setTimeout(()=>setErr(false),1200);
      }
    } else {
      // Músico: só senha
      const usuario=USUARIOS.find(u=>u.tipo===perfil&&u.senha===pw);
      if(usuario){
        const session={role:usuario.role,nome:usuario.nome,perfil};
        saveSession(session);
        onOk(session);
      } else {
        setErr(true); setPw(""); setTimeout(()=>setErr(false),1200);
      }
    }

function Fld({label,value,onChange,placeholder,as,children,type="text",rows=4,mono=false}){

function DatePicker({label,value,onChange}){
  const [open,setOpen]=React.useState(false);
  const MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const DAYS=["D","S","T","Q","Q","S","S"];
  const parsed=value?new Date(value+"T00:00"):new Date();
  const [view,setView]=React.useState({y:parsed.getFullYear(),m:parsed.getMonth()});
  const sel=value||"";

  const cells=()=>{
    const{y,m}=view;
    const first=new Date(y,m,1).getDay();
    const total=new Date(y,m+1,0).getDate();
    const arr=[];
    for(let i=0;i<first;i++) arr.push(null);
    for(let d=1;d<=total;d++) arr.push(d);
    return arr;
  };
  const toStr=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const today=toStr(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  const fmtDisp=v=>{ if(!v)return "Selecionar data"; const[y,m,d]=v.split("-"); return `${d}/${m}/${y}`; };

  return(
    <div style={{marginBottom:12,position:"relative"}}>
      {label&&<label style={{fontSize:10,letterSpacing:1.5,color:getAccent().light_theme?"rgba(0,0,0,0.42)":"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:5}}>{label}</label>}
      <button onClick={()=>setOpen(p=>!p)} style={{width:"100%",background:getAccent().light_theme?"rgba(0,0,0,0.04)":"rgba(255,255,255,0.05)",border:getAccent().light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 13px",color:sel?getAccent().text:getAccent().light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",fontSize:14,fontFamily:"inherit",outline:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",textAlign:"left"}}>
        <span>📅 {fmtDisp(sel)}</span>
        <span style={{color:getAccent().light_theme?"rgba(107,53,184,0.6)":"rgba(255,255,255,0.3)",fontSize:12,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:300,background:getAccent().bgCard,border:"1px solid rgba(255,255,255,0.12)",borderRadius:14,padding:14,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
          {/* Nav mês */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <button onClick={()=>setView(p=>{ const d=new Date(p.y,p.m-1,1); return{y:d.getFullYear(),m:d.getMonth()}; })} style={{background:getAccent().light_theme?"rgba(0,0,0,0.05)":"rgba(255,255,255,0.06)",border:getAccent().light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",color:getAccent().light_theme?"#1A1028":getAccent().text,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>‹</button>
            <span style={{fontSize:13,fontWeight:600,color:getAccent().light_theme?"#1A1028":getAccent().text}}>{MONTHS[view.m]} {view.y}</span>
            <button onClick={()=>setView(p=>{ const d=new Date(p.y,p.m+1,1); return{y:d.getFullYear(),m:d.getMonth()}; })} style={{background:getAccent().light_theme?"rgba(0,0,0,0.05)":"rgba(255,255,255,0.06)",border:getAccent().light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",color:getAccent().light_theme?"#1A1028":getAccent().text,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>›</button>
          </div>
          {/* Dias da semana */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
            {DAYS.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:getAccent().light_theme?"rgba(107,53,184,0.6)":"rgba(255,255,255,0.3)",fontWeight:600,padding:"2px 0"}}>{d}</div>)}
          </div>
          {/* Células */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {cells().map((d,i)=>{
              if(!d) return <div key={i}/>;
              const ds=toStr(view.y,view.m,d);
              const isSel=ds===sel;
              const isToday=ds===today;
              return(
                <button key={i} onClick={()=>{ onChange({target:{value:ds}}); setOpen(false); }} style={{padding:"7px 0",borderRadius:8,border:isSel?`1px solid rgba(${getAccent().rgb},0.6)`:isToday?`1px solid ${getAccent().light_theme?"rgba(0,0,0,0.2)":"rgba(255,255,255,0.15)"}`:"1px solid transparent",background:isSel?`rgba(${getAccent().rgb},0.15)`:isToday?getAccent().light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.06)":"transparent",color:isSel?getAccent().accent:isToday?getAccent().text:getAccent().light_theme?"rgba(0,0,0,0.6)":"rgba(255,255,255,0.7)",fontSize:12,fontWeight:isSel||isToday?700:400,cursor:"pointer",fontFamily:"inherit",transition:"all 0.1s"}}>
                  {d}
                </button>
              );
            })}
          </div>
          {/* Hoje */}
          <button onClick={()=>{ onChange({target:{value:today}}); setOpen(false); }} style={{width:"100%",marginTop:10,background:getAccent().light_theme?"rgba(0,0,0,0.03)":"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:getAccent().light_theme?"rgba(0,0,0,0.5)":"rgba(255,255,255,0.5)",fontSize:11,padding:"6px",cursor:"pointer",fontFamily:"inherit"}}>Hoje</button>
        </div>
      )}
    </div>
  );
}

/* ── Render Cifra com acordes coloridos ── */
function renderCifra(texto,accent){
  const corAcorde=accent.accent;
  const corLetra=accent.text;
  // Regex para detectar acordes: C, Dm, G#m, Bb7, F/C, etc.
  const reAcorde=/^[A-G][#b]?(m|maj|min|dim|aug|sus|add)?[0-9]?(\/[A-G][#b]?)?$/;
  const isAcordeLine=line=>{
    const tokens=line.trim().split(/\s+/).filter(Boolean);
    if(!tokens.length)return false;
    const hits=tokens.filter(t=>reAcorde.test(t));
    return hits.length/tokens.length>=0.5;
  };
  return texto.split("\n").map((line,li)=>{
    if(isAcordeLine(line)){
      // Divide por espaços mantendo espaços, colore cada acorde
      const parts=line.split(/(\S+)/g).map((part,pi)=>{
        if(reAcorde.test(part.trim())&&part.trim()!==""){
          return React.createElement("span",{key:pi,style:{color:corAcorde,fontWeight:700}},part);
        }
        return React.createElement("span",{key:pi,style:{color:corLetra}},part);
      });
      return React.createElement("span",{key:li,style:{display:"block"}},[...parts,"\n"]);
    }
    return React.createElement("span",{key:li,style:{display:"block",color:corLetra}},line+"\n");
  });
}

/* ── Cifra Popup ── */
function CifraPopup({louvor,onClose}){
  const accent=getAccent();
  const [scrolling,setScrolling]=React.useState(false);
  const [vel,setVel]=React.useState(3);
  const [fontSize,setFontSize]=React.useState(17);
  const [semitons,setSemitons]=React.useState(0);
  const NOTAS=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const ENARMONICOS={"Db":"C#","Eb":"D#","Fb":"E","Gb":"F#","Ab":"G#","Bb":"A#","Cb":"B"};
  const normNota=function(n){return ENARMONICOS[n]||n;};
  function transposeAcorde(acorde,st){
    if(st===0)return acorde;
    var m=acorde.match(/^([A-G][#b]?)(.*?)(\/([A-G][#b]?))?$/);
    if(!m)return acorde;
    var raiz=m[1],mod=m[2]||"",baixo=m[4]||"";
    var idx=NOTAS.indexOf(normNota(raiz));
    if(idx<0)return acorde;
    var novaRaiz=NOTAS[(idx+st+120)%12];
    var resultado=novaRaiz+mod;
    if(baixo){var bi=NOTAS.indexOf(normNota(baixo));if(bi>=0)resultado+="/"+NOTAS[(bi+st+120)%12];}
    return resultado;
  }
  function transposeCifra(texto,st){
    if(!texto||st===0)return texto;
    var reAcorde=/^[A-G][#b]?(m|maj|min|dim|aug|sus|add)?[0-9]?(\/[A-G][#b]?)?$/;
    return texto.split("
").map(function(line){
      var tokens=line.split(/(\s+)/);
      var words=tokens.filter(function(t){return t.trim();});
      var isAc=words.length>0&&words.filter(function(t){return reAcorde.test(t);}).length/words.length>=0.5;
      if(!isAc)return line;
      return tokens.map(function(t){return t.trim()&&reAcorde.test(t.trim())?transposeAcorde(t.trim(),st):t;}).join("");
    }).join("\n");
  }
  const divRef=React.useRef(null);
  const timerRef=React.useRef(null);

  React.useEffect(function(){
    clearInterval(timerRef.current);
    if(!scrolling) return;
    var ms = Math.max(50, 320 - vel * 27);
    timerRef.current = setInterval(function(){
      var el = divRef.current;
      if(!el){ clearInterval(timerRef.current); return; }
      el.scrollTop += 1;
      if(el.scrollTop + el.clientHeight >= el.scrollHeight - 2){
        clearInterval(timerRef.current);
        setScrolling(false);
      }
    }, ms);
    return function(){ clearInterval(timerRef.current); };
  },[scrolling, vel]);

  var toggleScroll = function(){
    var el = divRef.current;
    if(el && !scrolling && el.scrollTop + el.clientHeight >= el.scrollHeight - 4){
      el.scrollTop = 0;
    }
    setScrolling(function(s){ return !s; });
  };

  return(
    <div onClick={function(e){if(e.target===e.currentTarget)onClose();}}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:700,display:"flex",flexDirection:"column"}}>
      <div style={{background:accent.bgCard,borderRadius:"20px 20px 0 0",marginTop:"auto",maxHeight:"92vh",display:"flex",flexDirection:"column",width:"100%",maxWidth:700,marginLeft:"auto",marginRight:"auto"}}>
        <div style={{padding:"16px",borderBottom:"1px solid "+accent.border,display:"flex",alignItems:"center",gap:10,flexShrink:0,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700,color:accent.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{"𝄞 "+louvor.titulo}</div>
            {louvor.artista&&<div style={{fontSize:11,color:accent.textSub,marginTop:2}}>{louvor.artista}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}>
            {/* Tom */}
            <div style={{display:"flex",alignItems:"center",gap:4,borderRight:"1px solid rgba(255,255,255,0.1)",paddingRight:8}}>
              <button onClick={function(){setSemitons(function(s){return s-1;});}}
                style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:accent.text,borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:16,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{"−"}</button>
              <div style={{textAlign:"center",minWidth:36}}>
                <div style={{fontSize:13,fontWeight:700,color:semitons!==0?accent.accent:"rgba(255,255,255,0.35)",lineHeight:1}}>{semitons>0?"+"+semitons:semitons}</div>
                <div style={{fontSize:8,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:0.5}}>{"tom"}</div>
              </div>
              <button onClick={function(){setSemitons(function(s){return s+1;});}}
                style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:accent.text,borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:16,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{"+"}</button>
              {semitons!==0&&<button onClick={function(){setSemitons(0);}}
                style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:11,fontFamily:"inherit",padding:"0 2px",lineHeight:1}}>{"↺"}</button>}
            </div>
            {/* Fonte */}
            <div style={{display:"flex",alignItems:"center",gap:4,borderRight:"1px solid rgba(255,255,255,0.1)",paddingRight:8}}>
              <button onClick={function(){setFontSize(function(f){return Math.max(12,f-1);});}}
                style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:accent.text,borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{"A−"}</button>
              <span style={{fontSize:10,color:accent.textSub,minWidth:22,textAlign:"center"}}>{fontSize}</span>
              <button onClick={function(){setFontSize(function(f){return Math.min(32,f+1);});}}
                style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:accent.text,borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{"A+"}</button>
            </div>
            {/* Controle de velocidade */}
            <button onClick={function(){setVel(function(v){return Math.max(1,v-1);});}}
              style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:accent.text,borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:18,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>{"−"}</button>
            <span style={{fontSize:11,fontWeight:700,color:accent.accent,minWidth:28,textAlign:"center"}}>{vel}</span>
            <button onClick={function(){setVel(function(v){return Math.min(10,v+1);});}}
              style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:accent.text,borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:18,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>{"+"}</button>
            <button onClick={toggleScroll}
              style={{background:scrolling?"rgba("+accent.rgb+",0.2)":"rgba(255,255,255,0.08)",border:scrolling?"1px solid rgba("+accent.rgb+",0.5)":"1px solid rgba(255,255,255,0.12)",color:scrolling?accent.accent:accent.textSub,borderRadius:10,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",minWidth:80,textAlign:"center"}}>
              {scrolling?"⏸ Parar":"▶ Auto"}
            </button>
            <button onClick={onClose}
              style={{background:"rgba(255,255,255,0.06)",border:"none",color:"rgba(255,255,255,0.5)",borderRadius:"50%",width:30,height:30,cursor:"pointer",fontSize:16,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>{"✕"}</button>
          </div>
        </div>
        <div ref={divRef} style={{overflowY:"auto",flex:1,padding:"16px 20px"}}>
          <pre style={{margin:0,fontFamily:"'Courier New',monospace",fontSize:fontSize,lineHeight:2.1,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
            {renderCifra(transposeCifra(louvor.cifra||"",semitons),accent)}
          </pre>
          <div style={{height:80}}/>
        </div>
      </div>
    </div>
  );
}

        grd.addColorStop(1,"rgba(180,220,255,0)");
        ctx.strokeStyle=grd;ctx.lineWidth=0.8;
        ctx.beginPath();ctx.moveTo(x,y0);ctx.lineTo(x,y0+len);ctx.stroke();
      }
      ctx.fillStyle="rgba(100,180,255,0.25)";ctx.fillRect(cv.width*0.1,cv.height*0.28,cv.width*0.25,cv.height*0.08);
      ctx.fillStyle="rgba(255,255,255,0.6)";ctx.fillRect(cv.width*0.08,cv.height*0.42,cv.width*0.84,cv.height*0.1);
      ctx.fillRect(cv.width*0.12,cv.height*0.57,cv.width*0.76,cv.height*0.1);
    }
  },
  {
    id:"rosa",label:"Rosa Suave",emoji:"🌸",bg:"linear-gradient(135deg,#1a0010,#0d0015,#150008)",
    bodyStyle:"background:linear-gradient(135deg,#1a0010 0%,#0d0015 50%,#150008 100%);",
    extraCSS:"",
    extraHTML:`<canvas id="cv" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></canvas>`,
    extraJS:`const cv=document.getElementById('cv');const ctx=cv.getContext('2d');function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const orbs=Array.from({length:6},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*130+60,sp:Math.random()*0.003+0.001,phase:Math.random()*Math.PI*2,color:Math.random()>0.5?'255,80,160':'180,50,255'}));const pts=Array.from({length:50},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.2+0.3,phase:Math.random()*Math.PI*2,sp:Math.random()*0.02+0.005}));function draw(){const g2=ctx.createLinearGradient(0,0,cv.width,cv.height);g2.addColorStop(0,'#1a0010');g2.addColorStop(0.5,'#0d0015');g2.addColorStop(1,'#150008');ctx.fillStyle=g2;ctx.fillRect(0,0,cv.width,cv.height);const t=Date.now()/1000;orbs.forEach(o=>{const x=o.x+Math.sin(t*o.sp*5+o.phase)*cv.width*0.1;const y=o.y+Math.cos(t*o.sp*3+o.phase)*cv.height*0.08;const op=0.06+0.05*Math.sin(t*o.sp*8+o.phase);const gr=ctx.createRadialGradient(x,y,0,x,y,o.r);gr.addColorStop(0,'rgba('+o.color+','+Math.max(0,op)+')');gr.addColorStop(1,'rgba('+o.color+',0)');ctx.fillStyle=gr;ctx.fillRect(0,0,cv.width,cv.height);});pts.forEach(p=>{const op=0.15+0.7*Math.abs(Math.sin(t*p.sp*8+p.phase));ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,180,220,'+op.toFixed(2)+')';ctx.fill();});requestAnimationFrame(draw);}draw();`,
    draw:(cv,ctx,t)=>{
      const g=ctx.createLinearGradient(0,0,cv.width,cv.height);
      g.addColorStop(0,"#1a0010");g.addColorStop(0.5,"#0d0015");g.addColorStop(1,"#150008");
      ctx.fillStyle=g;ctx.fillRect(0,0,cv.width,cv.height);
      [[0.25,0.4,"255,80,160"],[0.75,0.55,"180,50,255"],[0.5,0.2,"255,100,180"]].forEach(([rx,ry,c],i)=>{
        const px=cv.width*(rx+Math.sin(t*0.3+i)*0.06);
        const py=cv.height*(ry+Math.cos(t*0.22+i)*0.05);
        const gr=ctx.createRadialGradient(px,py,0,px,py,cv.width*0.28);
        gr.addColorStop(0,`rgba(${c},0.13)`);gr.addColorStop(1,"rgba(0,0,0,0)");
        ctx.fillStyle=gr;ctx.fillRect(0,0,cv.width,cv.height);
      });
      for(let i=0;i<12;i++){
        const px=(i*43+20)%cv.width;const py=(i*31+10)%cv.height;
        const op=0.15+0.6*Math.abs(Math.sin(t*0.6+i*0.5));
        ctx.beginPath();ctx.arc(px,py,0.7+i%2*0.4,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,180,220,${op.toFixed(2)})`;ctx.fill();
      }
      ctx.fillStyle="rgba(255,100,180,0.25)";ctx.fillRect(cv.width*0.1,cv.height*0.28,cv.width*0.25,cv.height*0.08);
      ctx.fillStyle="rgba(255,255,255,0.6)";ctx.fillRect(cv.width*0.08,cv.height*0.42,cv.width*0.84,cv.height*0.1);
      ctx.fillRect(cv.width*0.12,cv.height*0.57,cv.width*0.76,cv.height*0.1);
    }
  },
];

/* ── Preview animado de cada fundo (canvas inline) ── */
function FundoPreviewCanvas({fundo,ativo,onClick}){
  const cvRef=useRef(null);
  const rafRef=useRef(null);
  useEffect(()=>{
    const cv=cvRef.current; if(!cv) return;
    const ctx=cv.getContext('2d');
    let alive=true;
    function loop(){ if(!alive) return; try{fundo.draw(cv,ctx,Date.now()/1000);}catch(e){} rafRef.current=requestAnimationFrame(loop); }
    loop();
    return()=>{ alive=false; cancelAnimationFrame(rafRef.current); };
  },[fundo.id]);
  return(
    <button onClick={onClick} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",padding:0}}>
      <div style={{position:"relative",width:82,height:52,borderRadius:8,overflow:"hidden",border:ativo?"2px solid #C9A84C":"2px solid rgba(255,255,255,0.1)",boxShadow:ativo?"0 0 16px rgba(201,168,76,0.65)":"none",transition:"border 0.15s,box-shadow 0.15s"}}>
        <canvas ref={cvRef} width={82} height={52} style={{display:"block"}}/>
        {ativo&&<div style={{position:"absolute",top:3,right:5,fontSize:9,color:"#C9A84C",fontWeight:700,textShadow:"0 0 6px #000"}}>✓</div>}
      </div>
      <span style={{fontSize:10,color:ativo?"#C9A84C":"rgba(255,255,255,0.45)",fontWeight:ativo?700:400,whiteSpace:"nowrap"}}>{fundo.emoji} {fundo.label}</span>
    </button>
  );
}

function TelaoPanel({cultos,accent}){

  const slideProx=slides.slice(slideIdx+1,slideIdx+4);

  // Abre/atualiza janela TV

    if(tvRef.current&&!tvRef.current.closed){
      tvRef.current.focus();
    } else {

    }
    atualizarTV(slideIdx);

    const titulo=louvorSel?louvorSel.titulo:"";

    const escapeHtml=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const linhasHTML=slide.split("\n").map(line=>{
      if(isAcordeLine(line)){
        const parts=line.split(/(\S+)/g).map(p=>{
          if(!p) return "";

          return p.replace(/ /g,"&nbsp;");
        }).join("");
        return `<div class="acorde">${parts}</div>`;
      }
      return `<div class="letra">${escapeHtml(line)||"&nbsp;"}</div>`;
    }).join("");

    const bodyStyle=fundo?fundo.bodyStyle:customFundo?"background:#000;":"background:#000;";
    const extraCSS=fundo?fundo.extraCSS:"";

    <style>
      *{margin:0;padding:0;box-sizing:border-box;}

      .artista{font-size:12px;color:rgba(255,255,255,0.4);}
      .slide-wrap{text-align:center;max-width:1200px;width:100%;position:relative;z-index:5;}
      .acorde{font-family:'Courier New',monospace;font-size:26px;line-height:1.5;white-space:pre;text-align:center;display:block;margin-bottom:2px;text-shadow:0 0 20px rgba(201,168,76,0.4);}
      .letra{font-size:54px;line-height:1.5;font-weight:400;text-align:center;display:block;margin-bottom:6px;text-shadow:0 2px 30px rgba(0,0,0,0.95),0 0 60px rgba(0,0,0,0.8);}
      .vazio{font-size:36px;color:rgba(255,255,255,0.15);text-align:center;margin-top:80px;}
      ${extraCSS}
    </style></head><body>
    ${extraHTML}
    <div class="topo"><span class="titulo">♪ ${escapeHtml(titulo)}</span><span class="artista">${escapeHtml(artista)}</span></div>
    <div class="slide-wrap">${slide?linhasHTML:'<div class="vazio">— Nenhum verso selecionado —</div>'}</div>
    <script>${extraJS}<\/script>
    </body></html>`);
    win.document.close();

                  <span style={{fontSize:12,color:"rgba(255,255,255,0.5)",minWidth:40,textAlign:"center"}}>{slides.length>0?`${slideIdx+1}/${slides.length}`:"—"}</span>
                  <button onClick={()=>setSlideIdx(p=>Math.min(slides.length-1,p+1))} disabled={slideIdx>=slides.length-1} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:slideIdx>=slides.length-1?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.7)",borderRadius:8,width:32,height:32,cursor:slideIdx>=slides.length-1?"default":"pointer",fontSize:16,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                </div>
              </div>

              {slides.length===0&&(
                <div style={{background:"rgba(255,100,100,0.08)",border:"1px solid rgba(255,100,100,0.2)",borderRadius:12,padding:"20px",textAlign:"center",color:"rgba(255,150,150,0.7)",fontSize:13}}>
                  ⚠️ Este louvor não tem cifra/letra cadastrada.<br/>
                  <span style={{fontSize:11,opacity:0.7}}>Peça ao admin para adicionar a cifra no cadastro deste louvor.</span>
                </div>
              )}

              {slides.length>0&&(
                <>
                  {/* Slide atual — grande */}
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:10,letterSpacing:1.5,color:"rgba(201,168,76,0.7)",textTransform:"uppercase",fontWeight:600,marginBottom:8}}>▶ Em exibição</div>
                    <SlidePreview text={slideAtual} active={true} onClick={()=>{}} small={false}/>
                  </div>

                  {/* Fila de próximos */}
                  {slideProx.length>0&&(
                    <div>
                      <div style={{fontSize:10,letterSpacing:1.5,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",fontWeight:600,marginBottom:8}}>A seguir</div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {slideProx.map((s,i)=>(
                          <SlidePreview key={i} text={s} active={false} onClick={()=>setSlideIdx(slideIdx+1+i)} small={true}/>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Todos os versos (linha do tempo) */}
                  {slides.length>1&&(
                    <div style={{marginTop:16}}>
                      <div style={{fontSize:10,letterSpacing:1.5,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",fontWeight:600,marginBottom:8}}>Todos os versos</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {slides.map((s,i)=>{
                          const titulo=s.split("\n").find(l=>l.trim())||`Verso ${i+1}`;
                          return(
                            <button key={i} onClick={()=>setSlideIdx(i)} style={{
                              background:i===slideIdx?"rgba(201,168,76,0.2)":"rgba(255,255,255,0.05)",
                              border:i===slideIdx?"1px solid #C9A84C":"1px solid rgba(255,255,255,0.1)",
                              color:i===slideIdx?"#C9A84C":"rgba(255,255,255,0.4)",
                              borderRadius:8,padding:"5px 11px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:i===slideIdx?700:400,transition:"all 0.15s",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"
                            }} title={titulo}>
                              {i+1}. {titulo.replace(/[\[\]]/g,"").slice(0,20)}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
          ):(
            <div style={{color:"rgba(255,255,255,0.25)",fontSize:13,padding:20}}>Selecione um louvor ao lado</div>
          )}
        </div>
      )}
    </div>
  );
}

  const deleteCantorAt=idx=>askConfirm(

                    if(!tomAtual)return;
                    const novoIdx=(idxAtual+delta+lista.length)%lista.length;

                              𝄞
                            </button>
                          )}
                          <button onClick={e=>{e.stopPropagation();if(canEdit)setELF({cultoId:c.id,louvorId:l.id,louvor:{...l}});}}

                              <div style={{fontSize:20,fontWeight:700,color:playerTranspose!==0?accent.accent:"rgba(255,255,255,0.4)",lineHeight:1}}>{playerTranspose>0?"+"+playerTranspose:playerTranspose}</div>

                              {l.tom&&<div style={{fontSize:10,color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)"}}>ref: <span style={{color:accent.accent,fontWeight:700}}>{l.tom}</span></div>}
                            </div>
                            <button onClick={()=>setPlayerTranspose(p=>p+1)} style={{background:accent.light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.08)",border:accent.light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",color:getAccent().light_theme?"#1A1028":accent.text,borderRadius:8,width:32,height:32,fontSize:18,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                            {playerTranspose!==0&&<button onClick={()=>setPlayerTranspose(0)} style={{background:"none",border:"none",color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>↺</button>}
                          </div>
                        </div>

                      {/* Painel expandido */}

                          {escaladosCulto.length===0&&<div style={{fontSize:10,color:getAccent().light_theme?"rgba(0,0,0,0.30)":"rgba(255,255,255,0.2)",fontStyle:"italic",marginBottom:10}}>Escale músicos no culto para filtrar aqui</div>}

                          {/* Obs do louvor */}
                          {l.obs&&<div style={{fontSize:12,color:accent.light_theme?"rgba(0,0,0,0.55)":"rgba(255,255,255,0.5)",background:accent.light_theme?"rgba(0,0,0,0.04)":`rgba(${accent.rgb},0.06)`,border:`1px solid rgba(${accent.rgb},0.15)`,borderRadius:8,padding:"8px 10px",marginBottom:12,lineHeight:1.5}}>📝 {l.obs}</div>}

      {/* ══ MODAIS ══ */}

      {/* ── Popup de Cifra ── */}

      {/* ══ MODAL BACKUP ══ */}
      {showBackup&&isAdmin&&(()=>{
        // Ler backups do localStorage
        const lerBkp=(key,label)=>{
          try{
            const s=localStorage.getItem(key);
            if(!s)return null;
            const d=JSON.parse(s);
            return{...d,label};
          }catch(e){return null;}
        };
        const bkpCultos   = lerBkp("ba_bkp_cultos","Cultos");
        const bkpCantores = lerBkp("ba_bkp_cantores","Cantores");
        const bkpMusicos  = lerBkp("ba_bkp_musicos","Músicos");

        const fmtTs=ts=>{
          if(!ts)return"—";
          try{
            const d=new Date(ts);
            return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"})+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
          }catch(e){return ts;}
        };

        const exportarJSON=async()=>{
          const dados={
            exportadoEm:new Date().toISOString(),
            cultos,cantores,musicos,favs
          };
          const json=JSON.stringify(dados,null,2);
          const nomeArquivo="banda-aviva-backup-"+new Date().toISOString().split("T")[0]+".json";
          // Tentar File System Access API (Chrome/Edge — mostra seletor de pasta nativo)
          if(window.showSaveFilePicker){
            try{
              const fh=await window.showSaveFilePicker({
                suggestedName:nomeArquivo,
                types:[{description:"Arquivo de Backup",accept:{"application/json":[".json"]}}],
              });
              const ws=await fh.createWritable();
              await ws.write(json);
              await ws.close();
              showToast("Backup salvo com sucesso ✓");
              return;
            }catch(e){
              if(e.name==="AbortError") return; // usuário cancelou
              // fallback abaixo se der outro erro
            }
          }
          // Fallback para navegadores sem suporte (Safari, Firefox)
          const blob=new Blob([json],{type:"application/json"});
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          a.href=url; a.download=nomeArquivo;
          a.click(); URL.revokeObjectURL(url);
          showToast("Backup exportado ✓");
        };

        const restaurarFirebase=(tipo)=>{
          const doRestore=(dados,setFn,fbKey,label)=>{
            // Marca como vindo do Firebase para não re-salvar em loop
            if(fbKey==="cultos")  fromFb.current.cult=true;
            if(fbKey==="cantores")fromFb.current.cant=true;
            if(fbKey==="musicos") fromFb.current.mus=true;
            setFn(dados);
            fbSet(fbKey,dados);
            showToast(label+" restaurados ✓");
            setShowBackup(false);
          };
          if(tipo==="cultos"){
            if(!bkpCultos?.cultos?.length){showToast("Sem backup de cultos disponível",false);return;}
            askConfirm(`Restaurar ${bkpCultos.cultos.length} cultos do backup de ${fmtTs(bkpCultos.ts)}?`,
              ()=>doRestore(bkpCultos.cultos,setCultos,"cultos","Cultos"));
          } else if(tipo==="cantores"){
            if(!bkpCantores?.cantores?.length){showToast("Sem backup de cantores disponível",false);return;}
            askConfirm(`Restaurar ${bkpCantores.cantores.length} cantores do backup de ${fmtTs(bkpCantores.ts)}?`,
              ()=>doRestore(bkpCantores.cantores,setCantores,"cantores","Cantores"));
          } else if(tipo==="musicos"){
            if(!bkpMusicos?.musicos?.length){showToast("Sem backup de músicos disponível",false);return;}
            askConfirm(`Restaurar ${bkpMusicos.musicos.length} músicos do backup de ${fmtTs(bkpMusicos.ts)}?`,
              ()=>doRestore(bkpMusicos.musicos,setMusicos,"musicos","Músicos"));
          }
        };

        const importarJSON=(e)=>{
          const file=e.target.files[0];
          if(!file)return;
          const reader=new FileReader();
          reader.onload=ev=>{
            try{
              const dados=JSON.parse(ev.target.result);
              if(!dados.cultos&&!dados.cantores&&!dados.musicos){showToast("Arquivo inválido",false);return;}
              askConfirm(`Importar backup de ${fmtTs(dados.exportadoEm)}? Isso substituirá os dados atuais.`,()=>{
                if(dados.cultos?.length>0){setCultos(dados.cultos);fbSet("cultos",dados.cultos);}
                if(dados.cantores?.length>0){setCantores(dados.cantores);fbSet("cantores",dados.cantores);}
                if(dados.musicos?.length>0){setMusicos(dados.musicos);fbSet("musicos",dados.musicos);}
                if(dados.favs){setFavs(dados.favs);fbSet("favs",dados.favs);}
                showToast("Backup importado com sucesso ✓");
                setShowBackup(false);
              });
            }catch(err){showToast("Erro ao ler arquivo",false);}
          };
          reader.readAsText(file);
        };

        const accent2=getAccent();
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setShowBackup(false)}>
            <div style={{background:accent2.bgCard,borderRadius:18,width:"100%",maxWidth:440,maxHeight:"88vh",overflowY:"auto",border:`1px solid rgba(56,189,248,0.3)`}} onClick={e=>e.stopPropagation()}>

              {/* Header */}
              <div style={{padding:"18px 20px 14px",borderBottom:`1px solid ${accent2.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:16,fontWeight:700,color:accent2.text}}>💾 Backup & Restauração</div>
                  <div style={{fontSize:11,color:accent2.textSub,marginTop:2}}>3 camadas de proteção dos seus dados</div>
                </div>
                <button onClick={()=>setShowBackup(false)} style={{background:"rgba(255,255,255,0.08)",border:"none",color:accent2.textSub,borderRadius:8,padding:"4px 10px",fontSize:16,cursor:"pointer"}}>✕</button>
              </div>

              <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:16}}>

                {/* CAMADA 1 - Backup automático localStorage */}
                <div style={{background:`rgba(${accent2.rgb},0.06)`,border:`1px solid rgba(${accent2.rgb},0.15)`,borderRadius:12,padding:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:accent2.accent,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>🔄 Camada 1 — Backup Automático Local</div>
                  <div style={{fontSize:11,color:accent2.textSub,marginBottom:12,lineHeight:1.5}}>Salvo automaticamente neste dispositivo toda vez que os dados mudam.</div>
                  {[
                    {tipo:"cultos",   bkp:bkpCultos,   count:bkpCultos?.cultos?.length,   icon:"📅"},
                    {tipo:"cantores", bkp:bkpCantores, count:bkpCantores?.cantores?.length, icon:"🎤"},
                    {tipo:"musicos",  bkp:bkpMusicos,  count:bkpMusicos?.musicos?.length,   icon:"🎸"},
                  ].map(item=>(
                    <div key={item.tipo} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${accent2.border}`}}>
                      <div>
                        <div style={{fontSize:12,fontWeight:600,color:accent2.text}}>{item.icon} {item.bkp?.label||item.tipo} {item.count!=null?`(${item.count} registros)`:""}</div>
                        <div style={{fontSize:10,color:accent2.textSub}}>{item.bkp?fmtTs(item.bkp.ts):"Sem backup local ainda"}</div>
                      </div>
                      {item.bkp&&item.count>0&&(
                        <button onClick={()=>restaurarFirebase(item.tipo)}
                          style={{background:"rgba(56,189,248,0.15)",border:"1px solid rgba(56,189,248,0.3)",color:"#38BDF8",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600,flexShrink:0}}>
                          Restaurar
                        </button>
                      )}
                    </div>
                  ))}
                </div>

                {/* CAMADA 2 - Exportar JSON */}
                <div style={{background:"rgba(34,197,94,0.06)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:12,padding:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#4ADE80",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>📤 Camada 2 — Exportar Arquivo</div>

      {/* ══ MODAL SELECIONAR CULTO ══ */}

                const passados=cultosOrdenados.filter(c=>c.data<today).reverse();
                const lista=[...futuros,...passados];
                if(!lista.length) return(
                  <div style={{textAlign:"center",padding:30,color:accent.textSub,fontSize:13}}>Nenhum culto cadastrado ainda.</div>

                  const cf=CC[c.tipo];
                  const jatem=c.louvores.some(l=>l.titulo?.toLowerCase()===pickCultoLouvor.titulo?.toLowerCase());
                  const diff=daysUntil(c.data);
                  return(
                    <button key={c.id} disabled={jatem} onClick={()=>{
                      doAddLouvor(c.id, pickCultoLouvor);
                      setPickCultoLouvor(null);

                      style={{width:"100%",background:jatem?`rgba(${accent.rgb},0.04)`:`rgba(${accent.rgb},0.07)`,border:`1px solid rgba(${accent.rgb},${jatem?"0.08":"0.2"})`,borderRadius:12,padding:"12px 14px",cursor:jatem?"default":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:8,opacity:jatem?0.5:1,transition:"all 0.15s",textAlign:"left"}}>

                        {diff!==null&&<div style={{fontSize:10,fontWeight:600,color:diff===0?"#6BBFA3":diff>0?accent.accent:accent.textSub}}>{diff===0?"Hoje":diff>0?`em ${diff}d`:`há ${-diff}d`}</div>}

                  fbSet("cultos",novosCultos);
                  setPlayerTranspose(0);

                      <button onClick={()=>setPlayerTranspose(p=>p-1)} style={{background:accent.light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:getAccent().light_theme?"#1A1028":accent.text,borderRadius:12,width:52,height:52,fontSize:26,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <div style={{textAlign:"center",minWidth:90}}>
                        <div style={{fontSize:34,fontWeight:700,color:mudou?accent.accent:"rgba(255,255,255,0.5)",letterSpacing:1,lineHeight:1}}>
                          {mudou?sinal+playerTranspose:"0"}
                        </div>
                        <div style={{fontSize:10,color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",marginTop:4}}>

                    {playL.tom&&(
                      <div style={{textAlign:"center",fontSize:11,color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",marginBottom:10}}>

                    {mudou&&(

                      </div>

                  </div>
                );
              })()}

              <div style={{textAlign:"center",marginTop:10}}>
                <a href={playL.ytUrl} target="_blank" rel="noopener noreferrer" style={{color:accent.accent,fontSize:12,textDecoration:"none",background:accent.light_theme?"rgba(0,0,0,0.04)":"rgba(255,255,255,0.05)",padding:"6px 14px",borderRadius:20,border:accent.light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)"}}>
                  🔗 Abrir no YouTube
                </a>
              </div>
            </>
          ):<p style={{color:accent.light_theme?"rgba(0,0,0,0.45)":"rgba(255,255,255,0.4)",textAlign:"center",padding:20}}>Link de vídeo não disponível</p>}

            <div key={f.id} onClick={()=>{ doAddLouvor(sel.id,f); setFavPk(false); }} className="pill" style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",marginBottom:6,cursor:"pointer",background:accent.light_theme?"rgba(0,0,0,0.02)":"rgba(255,255,255,0.02)"}}>

            </div>

      {/* Editar cantor */}

            setCantores(p=>p.map((c,i)=>i===editCI?atualizado:c));

        </Ovl>
      )}

      {/* Adicionar músico */}
      {showAddM&&(
        <Ovl bg={accent.bgCard} border={`1px solid ${accent.border}`} onClose={()=>setShowAddM(false)}>
          <MH title="Novo Músico" onClose={()=>setShowAddM(false)}/>
          <Fld label="Nome" value={newMusN} placeholder="Nome do músico" onChange={e=>setNewMusN(e.target.value)}/>
          <Fld label="Instrumento" as="select" value={newMusInst} onChange={e=>setNewMusInst(e.target.value)}>
            {["Bateria","Guitarra","Teclado","Contra Baixo","Violão","Baixo","Saxofone","Outro"].map(i=><option key={i}>{i}</option>)}
          </Fld>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button style={bGhost} onClick={()=>setShowAddM(false)}>Cancelar</button>
            <button style={bGold} onClick={()=>{ if(!newMusN.trim())return; const e=newMusInst==="Bateria"?"🥁":newMusInst==="Guitarra"?"🎸":newMusInst==="Teclado"?"🎹":"🎵"; setMusicos(p=>[...p,{id:uid(),nome:newMusN.trim(),instrumento:newMusInst,emoji:e}]); setNewMusN(""); setShowAddM(false); showToast("Músico adicionado ✓"); }}>Adicionar</button>
          </div>
        </Ovl>
      )}

      {/* Tema */}
      {showTheme&&(
        <Ovl bg={accent.bgCard} border={`1px solid ${accent.border}`} onClose={()=>setShowTheme(false)}>
          <MH title="Tema" onClose={()=>setShowTheme(false)}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8}}>
            {Object.entries(THEMES).map(([k,t])=>(
              <button key={k} onClick={()=>{setThemeKey(k);setShowTheme(false);}} style={{padding:0,borderRadius:14,border:themeKey===k?`2px solid ${t.accent}`:"1px solid rgba(255,255,255,0.1)",background:"transparent",cursor:"pointer",fontFamily:"inherit",overflow:"hidden",transition:"all 0.15s"}}>
                {/* Mini preview */}
                <div style={{background:t.bg,padding:"12px 10px 8px"}}>
                  <div style={{background:t.bgCard,borderRadius:8,padding:"8px 10px",marginBottom:6,border:`1px solid rgba(${t.rgb},0.3)`}}>
                    <div style={{fontSize:9,fontWeight:700,color:t.accent,letterSpacing:1,marginBottom:2}}>BANDA AVIVA</div>
                    <div style={{height:4,borderRadius:2,background:t.accent,width:"60%",marginBottom:4}}/>
                    <div style={{height:3,borderRadius:2,background:t.light_theme?"rgba(0,0,0,0.12)":"rgba(255,255,255,0.1)",width:"80%"}}/>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    <div style={{flex:1,height:6,borderRadius:3,background:`rgba(${t.rgb},0.4)`}}/>
                    <div style={{flex:1,height:6,borderRadius:3,background:t.light_theme?"rgba(0,0,0,0.08)":"rgba(255,255,255,0.07)"}}/>
                  </div>
                </div>
                <div style={{background:t.bgCard,padding:"8px 10px",borderTop:`1px solid rgba(${t.rgb},0.15)`}}>
                  <div style={{fontSize:12,color:t.accent,fontWeight:700,textAlign:"center"}}>{t.name}</div>
                  {themeKey===k&&<div style={{fontSize:9,color:t.accent,textAlign:"center",opacity:0.7}}>✓ ativo</div>}
                </div>
              </button>
            ))}
          </div>

          {/* Tamanho da fonte */}
          <div style={{marginTop:20,borderTop:`1px solid ${accent.border}`,paddingTop:16}}>
            <div style={{fontSize:10,letterSpacing:1.5,color:accent.light_theme?"rgba(0,0,0,0.42)":"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,marginBottom:12}}>Tamanho da Fonte</div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>setAppFontSize(f=>Math.max(11,f-1))}
                style={{background:accent.light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.08)",border:`1px solid ${accent.border}`,color:accent.text,borderRadius:8,width:36,height:36,cursor:"pointer",fontSize:18,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,flexShrink:0}}>A−</button>
              <div style={{flex:1,position:"relative",height:6,background:accent.light_theme?"rgba(0,0,0,0.08)":"rgba(255,255,255,0.1)",borderRadius:3}}>
                <div style={{position:"absolute",left:0,top:0,height:"100%",borderRadius:3,background:`linear-gradient(90deg,${accent.accent},${accent.light})`,width:`${((appFontSize-11)/(22-11))*100}%`,transition:"width 0.15s"}}/>
                {[11,13,14,16,18,20,22].map(s=>(
                  <button key={s} onClick={()=>setAppFontSize(s)}
                    style={{position:"absolute",top:"50%",left:`${((s-11)/(22-11))*100}%`,transform:"translate(-50%,-50%)",width:s===appFontSize?16:10,height:s===appFontSize?16:10,borderRadius:"50%",background:s===appFontSize?accent.accent:accent.light_theme?"rgba(0,0,0,0.25)":"rgba(255,255,255,0.3)",border:s===appFontSize?`2px solid ${accent.light}`:"none",cursor:"pointer",transition:"all 0.15s",padding:0}}/>
                ))}
              </div>
              <button onClick={()=>setAppFontSize(f=>Math.min(22,f+1))}
                style={{background:accent.light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.08)",border:`1px solid ${accent.border}`,color:accent.text,borderRadius:8,width:36,height:36,cursor:"pointer",fontSize:18,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,flexShrink:0}}>A+</button>
              <span style={{fontSize:13,fontWeight:700,color:accent.accent,minWidth:36,textAlign:"center"}}>{appFontSize}px</span>
              <button onClick={()=>setAppFontSize(14)}
                style={{background:"none",border:`1px solid ${accent.border}`,color:accent.light_theme?"rgba(0,0,0,0.4)":"rgba(255,255,255,0.35)",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Reset</button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:6,paddingLeft:48,paddingRight:90}}>
              <span style={{fontSize:9,color:accent.light_theme?"rgba(0,0,0,0.3)":"rgba(255,255,255,0.25)"}}>A</span>
              <span style={{fontSize:11,color:accent.light_theme?"rgba(0,0,0,0.3)":"rgba(255,255,255,0.25)"}}>A</span>
              <span style={{fontSize:13,color:accent.light_theme?"rgba(0,0,0,0.3)":"rgba(255,255,255,0.25)"}}>A</span>
            </div>
          </div>
        </Ovl>
      )}

      {/* Log de Acessos — só admin */}
      {showLog&&isAdmin&&(
        <Ovl bg={accent.bgCard} border={`1px solid ${accent.border}`} onClose={()=>setShowLog(false)} wide>
          <MH title="📋 Log de Acessos" onClose={()=>setShowLog(false)}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:12,color:accent.light_theme?"rgba(0,0,0,0.45)":"rgba(255,255,255,0.4)"}}>{logEntries.length} registro{logEntries.length!==1?"s":""}</span>
            {logEntries.length>0&&<button onClick={()=>askConfirm("Limpar todo o histórico de acessos?",clearLog)} style={{...bDanger,padding:"5px 12px",fontSize:12}}>🗑 Limpar histórico</button>}
          </div>
          {logEntries.length===0&&<p style={{color:accent.light_theme?"rgba(0,0,0,0.42)":"rgba(255,255,255,0.35)",fontSize:13,textAlign:"center",padding:"20px 0"}}>Nenhum acesso registrado.</p>}
          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:"60vh",overflowY:"auto"}}>
            {logEntries.map((e,i)=>{
              const dt=new Date(e.ts);
              const data=dt.toLocaleDateString("pt-BR");
              const hora=dt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,background:accent.light_theme?"rgba(0,0,0,0.03)":"rgba(255,255,255,0.03)",border:`1px solid rgba(255,255,255,0.06)`,borderLeft:`3px solid ${e.cor||"#888"}`}}>
                  <span style={{fontSize:12,fontWeight:700,color:e.cor||"#888",minWidth:110,whiteSpace:"nowrap"}}>{e.perfil||e.role}</span>
                  <span style={{fontSize:13,fontWeight:600,color:accent.text,flex:1}}>{e.nome}</span>
                  <span style={{fontSize:11,color:accent.light_theme?"rgba(0,0,0,0.42)":"rgba(255,255,255,0.35)",whiteSpace:"nowrap"}}>{data} {hora}</span>
                </div>
              );
            })}
          </div>
        </Ovl>
      )}

      {/* Toast */}
      {confirm&&<ConfirmModal msg={confirm.msg} onOk={()=>{confirm.onOk();setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}

      {toast&&(
        <div style={{position:"fixed",bottom:"calc(72px + env(safe-area-inset-bottom))",right:16,zIndex:9999,padding:"11px 18px",borderRadius:12,background:toast.ok?"rgba(76,175,125,0.97)":"rgba(224,123,138,0.97)",color:"#0F0F1A",fontWeight:700,fontSize:13,fontFamily:"inherit",boxShadow:"0 8px 28px rgba(0,0,0,0.5)",animation:"toastIn 0.25s ease"}}>
          {toast.msg}
        </div>
      )}

    </div>
  );
}

function App(){
  const [session,setSession]=useState(getSession);
  if(!session) return <TelaAcesso onOk={s=>setSession(s)}/>;
  return <AppMain session={session} setSession={setSession}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
  }
</script>
</body>
</html>

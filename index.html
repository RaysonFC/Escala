function localSearch(q){
  const w=q.toLowerCase().split(" ").filter(Boolean);
  return LOCAL_DB.filter(l=>w.some(x=>l.titulo.toLowerCase().includes(x)||l.artista.toLowerCase().includes(x)));
}

/* ── Busca YouTube via oEmbed (sem API key, sem CORS) ── */
async function ytSearch(q){
  // Tenta YouTube Data API primeiro
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q+" louvor gospel")}&type=video&maxResults=8&key=${YT_API_KEY}&regionCode=BR`);
    const d=await r.json();
    if(d.items&&d.items.length){
      return d.items.map(it=>({
        titulo:it.snippet.title,
        artista:it.snippet.channelTitle,
        ytId:it.id.videoId,
        ytUrl:"https://www.youtube.com/watch?v="+it.id.videoId,
        tom:"",cifra:"",obs:""
      }));
    }
  }catch(e){}
  // Fallback: banco local
  const loc=localSearch(q);
  if(loc.length) return loc.map(l=>({...l,ytId:getYTId(l.ytUrl),obs:""}));
  return [];
}

function Fld({label,value,onChange,placeholder,as,children,type="text"}){
  const base={width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 13px",color:"#EAE8F2",fontSize:14,fontFamily:"inherit",outline:"none",marginBottom:12};
  return(
    <div>
      {label&&<label style={{fontSize:10,letterSpacing:1.5,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:5}}>{label}</label>}
      {as==="textarea"?<textarea value={value} onChange={onChange} placeholder={placeholder} rows={3} style={{...base,resize:"vertical"}}/>
       :as==="select"?<select value={value} onChange={onChange} style={base}>{children}</select>
       :<input type={type} value={value} onChange={onChange} placeholder={placeholder} style={base}/>}
    </div>
  );
}

        <label style={{fontSize:10,letterSpacing:1.5,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:8}}>Emoji</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {EMOJIS.map(e=>(
            <button key={e} onClick={()=>setEmoji(e)} style={{fontSize:20,padding:6,borderRadius:8,border:"none",cursor:"pointer",background:emoji===e?"rgba("+accent.rgb+",0.25)":"rgba(255,255,255,0.05)",outline:emoji===e?"2px solid "+accent.accent:"none"}}>{e}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <button style={bDanger} onClick={()=>onDelete(idx)}>🗑 Remover</button>
        <div style={{display:"flex",gap:8}}>
          <button style={bGhost} onClick={onClose}>Cancelar</button>
          <button style={bGold} onClick={()=>onSave({...musico,nome:nome.trim(),instrumento:inst,emoji},idx)}>Salvar</button>
        </div>
      </div>
    </>
  );
}

   APP PRINCIPAL

function App(){
  const [cantores,setCantores]=useState(INIT_CANTORES);
  const [musicos,setMusicos]=useState(INIT_MUSICOS);
  const [cultos,setCultos]=useState(INIT_CULTOS);

  const [selId,setSelId]=useState(null);
  const [playL,setPlayL]=useState(null);
  const [toast,setToast]=useState(null);
  const [showTheme,setShowTheme]=useState(false);
  // Escalas
  const [editCI,setEditCI]=useState(null);
  const [editMI,setEditMI]=useState(null);
  const [showAddC,setShowAddC]=useState(false);
  const [showAddM,setShowAddM]=useState(false);
  const [newCantN,setNewCantN]=useState("");
  const [newMusN,setNewMusN]=useState("");
  const [newMusInst,setNewMusInst]=useState("Bateria");
  const [openCards,setOpenCards]=useState({});
  // Buscar
  const [sq,setSq]=useState("");
  const [sRes,setSRes]=useState([]);
  const [sLoad,setSLoad]=useState(false);
  const [sLocal,setSLocal]=useState(false);
  const [sErr,setSErr]=useState("");
  const [paste,setPaste]=useState("");
  // Novo louvor / culto
  const [newLF,setNLF]=useState(null);
  const [newCF,setNCF]=useState(null);
  const [showFavPk,setFavPk]=useState(false);

  const loaded=useRef({cant:false,mus:false,cult:false,favs:false});
  const fromFb=useRef({cant:false,mus:false,cult:false,favs:false});

  useEffect(()=>{
    const uC=fbListen("cantores",d=>{ fromFb.current.cant=true; setCantores(d.map(normCantor)); loaded.current.cant=true; });
    const uM=fbListen("musicos",d=>{ fromFb.current.mus=true; setMusicos(d.map(m=>({...m}))); loaded.current.mus=true; });
    const uCu=fbListen("cultos",d=>{ fromFb.current.cult=true; setCultos(d); loaded.current.cult=true; });
    const uF=fbListen("favs",d=>{ fromFb.current.favs=true; setFavs(d); loaded.current.favs=true; });
    try{ const t=localStorage.getItem("esc_theme"); if(t) setThemeKey(t); }catch{}
    fbGet("cantores",null).then(v=>{ if(!v) fbSet("cantores",INIT_CANTORES); });
    fbGet("musicos",null).then(v=>{ if(!v) fbSet("musicos",INIT_MUSICOS); });
    fbGet("cultos",null).then(v=>{ if(!v) fbSet("cultos",INIT_CULTOS); });
    fbGet("favs",null).then(v=>{ if(!v) fbSet("favs",INIT_FAVS); });
    return()=>{ uC(); uM(); uCu(); uF(); };
  },[]);

  useEffect(()=>{ if(!loaded.current.cant)return; if(fromFb.current.cant){fromFb.current.cant=false;return;} fbSet("cantores",cantores); },[cantores]);
  useEffect(()=>{ if(!loaded.current.mus)return; if(fromFb.current.mus){fromFb.current.mus=false;return;} fbSet("musicos",musicos); },[musicos]);
  useEffect(()=>{ if(!loaded.current.cult)return; if(fromFb.current.cult){fromFb.current.cult=false;return;} fbSet("cultos",cultos); },[cultos]);
  useEffect(()=>{ if(!loaded.current.favs)return; if(fromFb.current.favs){fromFb.current.favs=false;return;} fbSet("favs",favs); },[favs]);
  useEffect(()=>{ try{localStorage.setItem("esc_theme",themeKey);}catch{} },[themeKey]);

  const showToast=(msg,ok=true)=>{ setToast({msg,ok}); setTimeout(()=>setToast(null),2500); };
  const accent=THEMES[themeKey]||THEMES.gold;
  const bGold={background:"linear-gradient(135deg,"+accent.accent+","+accent.light+")",color:"#0F0F1A",border:"none",borderRadius:10,padding:"9px 18px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",whiteSpace:"nowrap"};
  const bGhost={background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.55)",borderRadius:8,padding:"8px 15px",cursor:"pointer",fontSize:13,fontFamily:"inherit"};
  const bDanger={background:"rgba(224,123,138,0.1)",border:"1px solid rgba(224,123,138,0.3)",color:"#E07B8A",borderRadius:8,padding:"7px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit"};

  const getC=id=>cultos.find(c=>c.id===id);
  const updC=c=>setCultos(p=>p.map(x=>x.id===c.id?c:x));
  const today=new Date().toISOString().split("T")[0];
  const proximos=cultos.filter(c=>{ const d=daysUntil(c.data); return d!==null; }).sort((a,b)=>a.data.localeCompare(b.data)).slice(0,5).map(c=>({...c,diff:daysUntil(c.data)}));
  const sel=selId?getC(selId):null;

  // Ações culto
  const toggleCantor=(cid,nome)=>{ const c=getC(cid); if(!c)return; updC({...c,cantores:c.cantores.includes(nome)?c.cantores.filter(n=>n!==nome):[...c.cantores,nome]}); };
  const toggleMusico=(cid,nome)=>{ const c=getC(cid); if(!c)return; const ms=c.musicos||[]; updC({...c,musicos:ms.includes(nome)?ms.filter(n=>n!==nome):[...ms,nome]}); };
  const toggleLembrete=cid=>{ const c=getC(cid); if(!c)return; updC({...c,lembrete:!c.lembrete}); };
  const doDelCulto=cid=>{ setCultos(p=>p.filter(c=>c.id!==cid)); setSelId(null); setTab("calendario"); showToast("Culto removido",false); };

  // Ações cantores/músicos
  const saveCantorEdit=(upd,idx)=>{ const old=cantores[idx]?.nome; setCantores(p=>p.map((c,i)=>i===idx?upd:c)); if(old!==upd.nome)setCultos(p=>p.map(c=>({...c,cantores:c.cantores.map(n=>n===old?upd.nome:n)}))); setEditCI(null); showToast("Cantor atualizado ✓"); };
  const deleteCantorAt=idx=>{ const nome=cantores[idx]?.nome; setCantores(p=>p.filter((_,i)=>i!==idx)); setCultos(p=>p.map(c=>({...c,cantores:c.cantores.filter(n=>n!==nome)}))); setEditCI(null); showToast("Cantor removido",false); };
  const saveMusicoEdit=(upd,idx)=>{ const old=musicos[idx]?.nome; setMusicos(p=>p.map((m,i)=>i===idx?upd:m)); if(old!==upd.nome)setCultos(p=>p.map(c=>({...c,musicos:(c.musicos||[]).map(n=>n===old?upd.nome:n)}))); setEditMI(null); showToast("Músico atualizado ✓"); };
  const deleteMusicoAt=idx=>{ const nome=musicos[idx]?.nome; setMusicos(p=>p.filter((_,i)=>i!==idx)); setCultos(p=>p.map(c=>({...c,musicos:(c.musicos||[]).filter(n=>n!==nome)}))); setEditMI(null); showToast("Músico removido",false); };

  // Novo culto
  const doAddCulto=()=>{
    if(!newCF)return;
    if(newCF.modo==="campanha"){
      const novos=[]; let d=new Date(newCF.data+"T00:00"); const n=parseInt(newCF.repeticoes)||4;
      for(let i=0;i<n;i++){
        novos.push({...mkC(d.toISOString().split("T")[0],newCF.tipo,newCF.tema,newCF.campanha),campanha:`${newCF.campanha} (${i+1}/${n})`});

    }else{
      setCultos(p=>[...p,mkC(newCF.data,newCF.tipo,newCF.tema,"")]); showToast("Culto criado ✓");
    }
    setNCF(null);
  };

  const doSearch=async()=>{
    if(!sq.trim())return;
    setSLoad(true); setSRes([]); setSErr(""); setSLocal(false);
    // Tenta YouTube API
    let r=[];
    let fromLocal=false;
    try{
      const resp=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(sq+" louvor gospel")}&type=video&maxResults=8&key=${YT_API_KEY}&regionCode=BR`);

      if(d.items&&d.items.length){
        r=d.items.map(it=>({titulo:it.snippet.title,artista:it.snippet.channelTitle,ytId:it.id.videoId,ytUrl:"https://www.youtube.com/watch?v="+it.id.videoId,tom:"",cifra:"",obs:""}));
      }

      {/* Glows */}

          </Fld>
          <Fld label="Data" type="date" value={newCF.data} onChange={e=>setNCF(p=>({...p,data:e.target.value}))}/>
          <Fld label="Tema (opcional)" value={newCF.tema} onChange={e=>setNCF(p=>({...p,tema:e.target.value}))} placeholder="Ex: Gratidão"/>
          {newCF.modo==="campanha"&&<>
            <Fld label="Nome da Campanha" value={newCF.campanha} onChange={e=>setNCF(p=>({...p,campanha:e.target.value}))} placeholder="Ex: Semana de Oração"/>
            <Fld label="Nº de semanas" as="select" value={newCF.repeticoes} onChange={e=>setNCF(p=>({...p,repeticoes:e.target.value}))}>
              {[2,3,4,5,6,7,8].map(n=><option key={n} value={n}>{n} semanas</option>)}
            </Fld>
          </>}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button style={bGhost} onClick={()=>setNCF(null)}>Cancelar</button>
            <button style={bGold} onClick={doAddCulto}>Criar</button>
          </div>
        </Ovl>
      )}

      {/* Favoritos picker */}
      {showFavPk&&sel&&(
        <Ovl onClose={()=>setFavPk(false)}>
          <MH title="Adicionar Favorito" onClose={()=>setFavPk(false)}/>
          {favs.length===0&&<p style={{color:"rgba(255,255,255,0.35)",fontSize:13}}>Nenhum favorito ainda.</p>}
          {favs.map(f=>(
            <div key={f.id} onClick={()=>{ doAddLouvor(sel.id,f); setFavPk(false); }} className="pill" style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",marginBottom:6,cursor:"pointer",background:"rgba(255,255,255,0.02)"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:"#EAE8F2"}}>{f.titulo}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{f.artista}</div>
              </div>
              <TomTag tom={f.tom}/>
            </div>
          ))}
        </Ovl>
      )}

      {/* Editar cantor */}
      {editCI!==null&&cantores[editCI]&&(
        <Ovl onClose={()=>setEditCI(null)}>
          <MH title="Editar Cantor" onClose={()=>setEditCI(null)}/>
          <CantorModal cantor={cantores[editCI]} idx={editCI} cultos={cultos} onSave={saveCantorEdit} onDelete={deleteCantorAt} onClose={()=>setEditCI(null)} accent={accent} bGold={bGold} bGhost={bGhost} bDanger={bDanger}/>
        </Ovl>
      )}

      {/* Adicionar cantor */}
      {showAddC&&(
        <Ovl onClose={()=>setShowAddC(false)}>
          <MH title="Novo Cantor" onClose={()=>setShowAddC(false)}/>
          <Fld label="Nome" value={newCantN} placeholder="Nome do cantor" onChange={e=>setNewCantN(e.target.value)}/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button style={bGhost} onClick={()=>setShowAddC(false)}>Cancelar</button>
            <button style={bGold} onClick={()=>{ if(!newCantN.trim())return; setCantores(p=>[...p,mkCantor(newCantN.trim())]); setNewCantN(""); setShowAddC(false); showToast("Cantor adicionado ✓"); }}>Adicionar</button>
          </div>
        </Ovl>
      )}

      {/* Editar músico */}
      {editMI!==null&&musicos[editMI]&&(
        <Ovl onClose={()=>setEditMI(null)}>
          <MH title="Editar Músico" onClose={()=>setEditMI(null)}/>
          <MusicoModal musico={musicos[editMI]} idx={editMI} onSave={saveMusicoEdit} onDelete={deleteMusicoAt} onClose={()=>setEditMI(null)} accent={accent} bGold={bGold} bGhost={bGhost} bDanger={bDanger}/>
        </Ovl>
      )}

      {/* Adicionar músico */}
      {showAddM&&(
        <Ovl onClose={()=>setShowAddM(false)}>
          <MH title="Novo Músico" onClose={()=>setShowAddM(false)}/>
          <Fld label="Nome" value={newMusN} placeholder="Nome do músico" onChange={e=>setNewMusN(e.target.value)}/>
          <Fld label="Instrumento" as="select" value={newMusInst} onChange={e=>setNewMusInst(e.target.value)}>
            {["Bateria","Guitarra","Teclado","Contra Baixo","Violão","Baixo","Saxofone","Outro"].map(i=><option key={i}>{i}</option>)}
          </Fld>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button style={bGhost} onClick={()=>setShowAddM(false)}>Cancelar</button>
            <button style={bGold} onClick={()=>{ if(!newMusN.trim())return; const e=newMusInst==="Bateria"?"🥁":newMusInst==="Guitarra"?"🎸":newMusInst==="Teclado"?"🎹":"🎵"; setMusicos(p=>[...p,{id:uid(),nome:newMusN.trim(),instrumento:newMusInst,emoji:e}]); setNewMusN(""); setShowAddM(false); showToast("Músico adicionado ✓"); }}>Adicionar</button>
          </div>
        </Ovl>
      )}

      {/* Tema */}
      {showTheme&&(
        <Ovl onClose={()=>setShowTheme(false)}>
          <MH title="Tema" onClose={()=>setShowTheme(false)}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8}}>
            {Object.entries(THEMES).map(([k,t])=>(
              <button key={k} onClick={()=>{setThemeKey(k);setShowTheme(false);}} style={{padding:"12px",borderRadius:12,border:themeKey===k?`2px solid ${t.accent}`:"1px solid rgba(255,255,255,0.1)",background:themeKey===k?`rgba(${t.rgb},0.12)`:"rgba(255,255,255,0.03)",cursor:"pointer",fontFamily:"inherit"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:t.accent,margin:"0 auto 8px"}}/>
                <div style={{fontSize:12,color:"#EAE8F2",fontWeight:themeKey===k?700:400}}>{t.name}</div>
              </button>
            ))}
          </div>
        </Ovl>
      )}

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:24,right:20,zIndex:9999,padding:"11px 18px",borderRadius:12,background:toast.ok?"rgba(76,175,125,0.97)":"rgba(224,123,138,0.97)",color:"#0F0F1A",fontWeight:700,fontSize:13,fontFamily:"inherit",boxShadow:"0 8px 28px rgba(0,0,0,0.5)",animation:"toastIn 0.25s ease"}}>
          {toast.msg}
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

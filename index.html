const db = firebase.firestore();

async function fbSet(col, data) {
  try { await db.collection("app").doc(col).set({ dados: JSON.stringify(data) }); } catch(e) { console.error("fbSet",e); }
}
function fbListen(col, cb) {
  return db.collection("app").doc(col).onSnapshot(snap => {
    if (snap.exists) { try { cb(JSON.parse(snap.data().dados)); } catch(e){} }
  });
}
function fbListenOpt(col, cb) {
  return db.collection("app").doc(col).onSnapshot(
    snap => { try { cb(snap.exists ? JSON.parse(snap.data().dados) : null); } catch(e){ cb(null); } },
    () => cb(null)
  );
}
async function fbGet(col, fallback) {
  try { const s = await db.collection("app").doc(col).get(); if (s.exists) return JSON.parse(s.data().dados); } catch(e){}
  return fallback;
}

// Chave da YouTube Data API v3 — coloque a sua aqui
const YT_API_KEY = "AIzaSyAsJxMF7VvZl2T6eqir9x8z88QHRBOFco0";

async function gospelSearch(q) {
  // Se não tem chave configurada, cai no banco local
  if (!YT_API_KEY || YT_API_KEY === "COLE_SUA_CHAVE_AQUI") {
    return localSearch(q);
  }
  try {
    const query = encodeURIComponent(q + " gospel letras");
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&maxResults=8&relevanceLanguage=pt&key=${YT_API_KEY}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (!data.items || data.items.length === 0) return localSearch(q);
    return data.items.map(item => {
      const ytId  = item.id.videoId;
      const title = item.snippet.title;
      const channel = item.snippet.channelTitle;
      // Tenta cruzar com banco local para pegar tom e cifra
      const local = localSearch(title.split(" ").slice(0,3).join(" "))[0];
      return {
        titulo:  title,
        artista: channel,
        tom:     local?.tom  || "",
        cifra:   local?.cifra || "",
        ytId,
        ytUrl: "https://www.youtube.com/watch?v=" + ytId,
        ytSearchUrl: "",
      };
    });
  } catch(e) {
    return localSearch(q);
  }
}

function localSearch(q) {
  const terms = q.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim().split(/\s+/);
  const norm  = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  return GOSPEL_DB.map(m => {
    const tN = norm(m.titulo), aN = norm(m.artista);
    let score = 0;
    for (const t of terms) {
      if (tN === t || aN === t)  score += 10;
      if (tN.startsWith(t))      score += 6;
      if (tN.includes(t))        score += 3;
      if (aN.includes(t))        score += 2;
    }
    return {...m, score};
  }).filter(m => m.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0, 8)
    .map(m => ({...m, ytUrl: "https://www.youtube.com/watch?v=" + m.ytId, ytSearchUrl: ""}));
}

async function aiSearch(query) {
  return gospelSearch(query);
}

      if(e.key==="ArrowRight"||e.key==="ArrowDown") setIdx(i=>Math.min(i+1,ll.length-1));
      if(e.key==="ArrowLeft" ||e.key==="ArrowUp")   setIdx(i=>Math.max(i-1,0));
      if(e.key==="Escape") onClose();
    };
    window.addEventListener("keydown",fn);
    return ()=>window.removeEventListener("keydown",fn);
  },[ll.length,onClose]);
  return (
    <div style={{position:"fixed",inset:0,zIndex:600,background:"#060610",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40}}>
      <button onClick={onClose} style={{position:"absolute",top:20,right:24,background:"rgba(255,255,255,0.08)",
        border:"none",color:"rgba(255,255,255,0.5)",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
        ✕ Sair (Esc)
      </button>
      <div style={{position:"absolute",fontSize:300,color:"rgba(255,255,255,0.02)",userSelect:"none",pointerEvents:"none",lineHeight:1}}>✝</div>
      <Badge tipo={culto.tipo}/>
      {l?(
        <div style={{textAlign:"center",marginTop:32,maxWidth:800}}>
          <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"clamp(36px,6vw,72px)",
            fontWeight:700,color:"#fff",lineHeight:1.15,marginBottom:16}}>{l.titulo}</div>
          <div style={{fontSize:"clamp(15px,2.5vw,26px)",color:"rgba(255,255,255,0.45)",marginBottom:28}}>{l.artista}</div>
          {l.tom&&(
            <div style={{display:"inline-flex",alignItems:"center",gap:16,
              background:"rgba("+cf.rgb+",0.12)",border:"1px solid rgba("+cf.rgb+",0.3)",
              borderRadius:12,padding:"12px 28px",marginBottom:20}}>
              <span style={{fontSize:12,letterSpacing:2,color:cf.color,textTransform:"uppercase",fontWeight:700}}>TOM</span>
              <span style={{fontSize:32,fontWeight:700,color:cf.color}}>{l.tom}</span>
              {l.cifra&&<><span style={{width:1,height:32,background:"rgba("+cf.rgb+",0.3)"}}/><span style={{fontSize:20,fontWeight:700,color:"rgba(255,255,255,0.7)",letterSpacing:1}}>{l.cifra}</span></>}
            </div>
          )}
        </div>
      ):<div style={{fontSize:20,color:"rgba(255,255,255,0.3)",marginTop:40}}>Sem louvores</div>}
      <div style={{position:"absolute",bottom:36,display:"flex",alignItems:"center",gap:20}}>
        <button onClick={()=>setIdx(i=>Math.max(i-1,0))} disabled={idx===0}
          style={{background:"rgba("+cf.rgb+",0.15)",border:"1px solid rgba("+cf.rgb+",0.3)",
            color:idx===0?"rgba(255,255,255,0.15)":cf.color,borderRadius:10,
            padding:"10px 28px",cursor:idx===0?"default":"pointer",fontSize:20,fontFamily:"inherit"}}>←</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:6}}>{idx+1} / {ll.length}</div>
          <div style={{display:"flex",gap:6,justifyContent:"center"}}>
            {ll.map((_,i)=>(
              <div key={i} onClick={()=>setIdx(i)} style={{width:i===idx?20:7,height:7,borderRadius:4,
                background:i===idx?cf.color:"rgba(255,255,255,0.2)",cursor:"pointer",transition:"all 0.2s"}}/>
            ))}
          </div>
        </div>
        <button onClick={()=>setIdx(i=>Math.min(i+1,ll.length-1))} disabled={idx===ll.length-1}
          style={{background:"rgba("+cf.rgb+",0.15)",border:"1px solid rgba("+cf.rgb+",0.3)",
            color:idx===ll.length-1?"rgba(255,255,255,0.15)":cf.color,borderRadius:10,
            padding:"10px 28px",cursor:idx===ll.length-1?"default":"pointer",fontSize:20,fontFamily:"inherit"}}>→</button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   WEEKLY VIEW
───────────────────────────────────────── */
function WeekView({cultos,onSelect,accent}) {
  const [off,setOff]=useState(0);
  const today=new Date().toISOString().split("T")[0];
  const days=Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setHours(0,0,0,0);
    const sun=new Date(d); sun.setDate(d.getDate()-d.getDay()+off*7);
    const day=new Date(sun); day.setDate(sun.getDate()+i);
    return day.toISOString().split("T")[0];
  });
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={()=>setOff(o=>o-1)} style={{background:"rgba(255,255,255,0.05)",
          border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.55)",
          borderRadius:8,padding:"5px 14px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>← Anterior</button>
        <span style={{fontSize:12,color:"rgba(255,255,255,0.45)",fontWeight:600}}>{fmtDate(days[0])} — {fmtDate(days[6])}</span>
        <button onClick={()=>setOff(o=>o+1)} style={{background:"rgba(255,255,255,0.05)",
          border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.55)",
          borderRadius:8,padding:"5px 14px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Próxima →</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
        {days.map(ds=>{
          const cc=cultos.filter(c=>c.data===ds); const isT=ds===today;
          return (
            <div key={ds} style={{borderRadius:9,minHeight:84,padding:"7px 5px",
              border:"1px solid "+(isT?"rgba("+accent.rgb+",0.5)":"rgba(255,255,255,0.07)"),
              background:isT?"rgba("+accent.rgb+",0.06)":"rgba(255,255,255,0.02)"}}>
              <div style={{fontSize:9,textAlign:"center",color:isT?accent.accent:"rgba(255,255,255,0.3)",
                fontWeight:isT?700:400,marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}}>
                {DAYS_PT[new Date(ds+"T12:00").getDay()]}
              </div>
              <div style={{fontSize:13,textAlign:"center",fontWeight:600,
                color:isT?accent.accent:"rgba(255,255,255,0.55)",marginBottom:5}}>
                {parseInt(ds.split("-")[2])}
              </div>
              {cc.map(c=>(
                <div key={c.id} onClick={()=>onSelect(c)} style={{borderRadius:4,padding:"2px 4px",fontSize:9,
                  fontWeight:700,cursor:"pointer",marginBottom:2,textAlign:"center",
                  color:CC[c.tipo].color,background:"rgba("+CC[c.tipo].rgb+",0.18)",
                  border:"1px solid rgba("+CC[c.tipo].rgb+",0.3)"}}>
                  {CC[c.tipo].short}
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   CANTOR EDIT MODAL
───────────────────────────────────────── */
function CantorModal({cantor,idx,cultos,onSave,onDelete,onClose,bGold,bGhost,bDanger}) {
  const [nome,setNome]=useState(cantor.nome);
  const [emoji,setEmoji]=useState(cantor.emoji||"🎤");
  const [favs,setFavs]=useState(cantor.louvoresFav||[]);

  const hist=cultos
    .filter(c=>c.cantores.includes(cantor.nome))
    .flatMap(c=>c.louvores.map(l=>({...l,tipo:c.tipo,data:c.data})));
  const seen=new Set();
  const uniq=hist.filter(l=>{const k=l.titulo+"|"+l.artista; if(seen.has(k))return false; seen.add(k);return true;});

  const isFaved=l=>favs.some(f=>f.titulo===l.titulo&&f.artista===l.artista);
  const addFav=l=>{ if(!isFaved(l)) setFavs(p=>[...p,{...l,id:uid()}]); };
  const remFav=id=>setFavs(p=>p.filter(f=>f.id!==id));

  const nCultos=cultos.reduce((a,c)=>a+(c.cantores.includes(cantor.nome)?1:0),0);

  return (
    <Ovl onClose={onClose} wide>
      <MH title="Editar Cantor" onClose={onClose}/>

      {/* Preview */}
      <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",
        background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12}}>
        <div style={{fontSize:44,lineHeight:1}}>{emoji}</div>
        <div>
          <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:20,fontWeight:700,color:"#EAE8F2"}}>{nome||"—"}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:3}}>
            {nCultos} cultos escalados{favs.length>0?" · ★ "+favs.length+" louvores":""}
          </div>
        </div>
      </div>

      {/* Nome */}
      <Fld label="Nome" value={nome} onChange={e=>setNome(e.target.value)} placeholder="Nome do cantor"/>

      {/* Emoji grid */}
      <div>
        <label style={{fontSize:10,letterSpacing:1.5,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:8}}>Escolher Emoji</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {EMOJIS.map(em=>(
            <button key={em} onClick={()=>setEmoji(em)} style={{
              width:38,height:38,borderRadius:8,fontSize:19,cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",
              border:emoji===em?"2px solid #C9A84C":"1px solid rgba(255,255,255,0.1)",
              background:emoji===em?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.04)",
              transition:"all 0.12s"}}>
              {em}
            </button>
          ))}
        </div>
      </div>

      {/* Louvores favoritos */}
      <div>
        <label style={{fontSize:10,letterSpacing:1.5,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:10}}>
          ★ Louvores Favoritos do Cantor
        </label>

        {favs.length===0&&<p style={{fontSize:12,color:"rgba(255,255,255,0.25)",fontStyle:"italic",marginBottom:10}}>Nenhum louvor salvo</p>}

        {favs.map(l=>(
          <div key={l.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
            borderRadius:8,background:"rgba(201,168,76,0.07)",border:"1px solid rgba(201,168,76,0.2)",marginBottom:5}}>
            <span style={{fontSize:14}}>★</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:"#EAE8F2",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.titulo}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",display:"flex",gap:8}}>
                {l.artista&&<span>{l.artista}</span>}
                {l.tom&&<span style={{color:"#C9A84C"}}>· {l.tom}</span>}
                {l.cifra&&<span style={{color:"rgba(255,255,255,0.25)"}}>· {l.cifra}</span>}
              </div>
            </div>
            <button onClick={()=>remFav(l.id)} style={{background:"none",border:"none",
              color:"rgba(224,123,138,0.5)",cursor:"pointer",fontSize:15,padding:0}}>✕</button>
          </div>
        ))}

        {/* Histórico dos cultos escalados */}
        {uniq.length>0&&(
          <div style={{marginTop:10}}>
            <div style={{fontSize:9,letterSpacing:1.5,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",fontWeight:600,marginBottom:7}}>
              Adicionar da lista de cultos escalados
            </div>
            <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:4,
              border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:6}}>
              {uniq.map(l=>{
                const faved=isFaved(l); const cf=CC[l.tipo];
                return (
                  <div key={l.titulo+l.artista} style={{display:"flex",alignItems:"center",gap:9,
                    padding:"7px 10px",borderRadius:7,
                    background:faved?"rgba(201,168,76,0.05)":"rgba(255,255,255,0.02)"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,color:"#EAE8F2",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.titulo}</div>
                      <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2}}>
                        {l.tom&&<span style={{fontSize:10,color:"#C9A84C",fontWeight:700}}>{l.tom}</span>}
                        <span style={{fontSize:10,color:cf.color}}>{cf.short}</span>
                        {l.cifra&&<span style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>{l.cifra}</span>}
                        <span style={{fontSize:10,color:"rgba(255,255,255,0.2)"}}>{fmtDate(l.data)}</span>
                      </div>
                    </div>
                    <button disabled={faved} onClick={()=>addFav(l)} style={{
                      background:faved?"rgba(255,255,255,0.03)":"rgba(201,168,76,0.12)",
                      border:faved?"1px solid rgba(255,255,255,0.08)":"1px solid rgba(201,168,76,0.3)",
                      color:faved?"rgba(255,255,255,0.25)":"#C9A84C",
                      borderRadius:7,padding:"4px 11px",cursor:faved?"default":"pointer",
                      fontSize:11,fontFamily:"inherit",fontWeight:600}}>
                      {faved?"✓ Adicionado":"+ Adicionar"}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <button style={bDanger} onClick={()=>onDelete(idx)}>🗑 Remover</button>
        <div style={{display:"flex",gap:8}}>
          <button style={bGhost} onClick={onClose}>Cancelar</button>
          <button style={bGold} onClick={()=>{if(nome.trim())onSave({...cantor,nome:nome.trim(),emoji,louvoresFav:favs});}}>Salvar</button>
        </div>
      </div>
    </Ovl>
  );
}

        {newLF&&(

              <Fld label="Título *" value={newLF.titulo} placeholder="Nome do louvor" onChange={e=>setNLF(f=>({...f,titulo:e.target.value}))}/>
              <Fld label="Artista" value={newLF.artista} placeholder="Hillsong..." onChange={e=>setNLF(f=>({...f,artista:e.target.value}))}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"85px 1fr",gap:10}}>
              <Fld label="Tom" as="select" value={newLF.tom} onChange={e=>setNLF(f=>({...f,tom:e.target.value}))}>
                <option value="">—</option>
                {TONS.map(t=><option key={t} value={t}>{t}</option>)}
              </Fld>
              <Fld label="Cifra / Progressão" value={newLF.cifra} placeholder="G – D – Em – C" onChange={e=>setNLF(f=>({...f,cifra:e.target.value}))}/>
            </div>
            <Fld label="Link YouTube" value={newLF.ytUrl} placeholder="https://youtu.be/..." onChange={e=>setNLF(f=>({...f,ytUrl:e.target.value}))}/>
            <Fld label="Obs" value={newLF.obs} placeholder="Versão ao vivo, etc." onChange={e=>setNLF(f=>({...f,obs:e.target.value}))}/>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button style={bGhost} onClick={()=>setNLF(null)}>Cancelar</button>
              <button style={bGold} onClick={()=>onAddLouvor(c.id)}>Salvar</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function MusicoEditForm({musico,idx,accent,bGold,bGhost,bDanger,onSave,onDelete,onClose}) {
  const [nome,  setNome]  = useState(musico.nome);
  const [inst,  setInst]  = useState(musico.instrumento);
  const [emoji, setEmoji] = useState(musico.emoji);

    <>

        <span style={{fontSize:40}}>{emoji}</span>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:"#EAE8F2"}}>{nome||musico.nome}</div>
          <div style={{fontSize:12,color:accent.accent}}>{inst}</div>

      </div>
      <Fld label="Nome" value={nome} onChange={e=>setNome(e.target.value)}/>
      <Fld label="Instrumento" as="select" value={inst} onChange={e=>setInst(e.target.value)}>
        {["Bateria","Guitarra","Teclado","Contra Baixo","Violão","Baixo","Saxofone","Trompete","Outro"].map(i=>(
          <option key={i} value={i}>{i}</option>
        ))}
      </Fld>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:10,letterSpacing:1.5,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:8}}>Emoji</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {EMOJIS.slice(0,30).map(e=>(
            <button key={e} onClick={()=>setEmoji(e)} style={{
              fontSize:20,padding:"6px",borderRadius:8,border:"none",cursor:"pointer",
              background:emoji===e?"rgba("+accent.rgb+",0.25)":"rgba(255,255,255,0.05)",
              outline:emoji===e?"2px solid "+accent.accent:"none"}}>
              {e}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <button style={bDanger} onClick={()=>onDelete(idx)}>🗑 Remover</button>
        <div style={{display:"flex",gap:8}}>
          <button style={bGhost} onClick={onClose}>Cancelar</button>
          <button style={bGold} onClick={()=>onSave({...musico,nome:nome.trim(),instrumento:inst,emoji},idx)}>Salvar</button>
        </div>
      </div>
    </>
  );
}

function App() {
  const [cantores, setCantores] = useState(INIT_CANTORES);
  const [musicos,  setMusicos]  = useState(INIT_MUSICOS);
  const [cultos,   setCultos]   = useState(INIT_CULTOS);
  const [favs,     setFavs]     = useState(INIT_FAVS);
  const [themeKey, setThemeKey] = useState("gold");
  const [fbReady,  setFbReady]  = useState(true); // Abre imediatamente com dados locais

  const loaded = useRef({cant:false, mus:false, cult:false, favs:false});
  const fromFb = useRef({cant:false, mus:false, cult:false, favs:false});

  useEffect(()=>{
    const checkReady = () => {
      if (loaded.current.cant && loaded.current.cult && loaded.current.favs) {
        setFbReady(true);
      }
    };

    const unCant = fbListen("cantores", data => {
      fromFb.current.cant = true;
      setCantores((data||[]).map(normalizeCantor));
      loaded.current.cant = true;
      checkReady();
    });
    const unMus = fbListenOpt("musicos", data => {
      fromFb.current.mus = true;
      if (data) setMusicos(data.map(m=>({louvoresFav:[],...m})));
      loaded.current.mus = true;
    });
    const unCult = fbListen("cultos", data => {
      fromFb.current.cult = true;
      setCultos(data||[]);
      loaded.current.cult = true;
      checkReady();
    });
    const unFavs = fbListen("favs", data => {
      fromFb.current.favs = true;
      setFavs(data||[]);
      loaded.current.favs = true;
      checkReady();
    });
    // Fallback: abre o app após 5s mesmo se algo falhar
    const fallback = setTimeout(() => setFbReady(true), 5000);
    try{ const t=localStorage.getItem("esc_theme"); if(t) setThemeKey(t); }catch{}
    fbGet("cantores",null).then(v=>{ if(!v) fbSet("cantores",INIT_CANTORES); });
    fbGet("musicos", null).then(v=>{ if(!v) fbSet("musicos", INIT_MUSICOS);  });
    fbGet("cultos",  null).then(v=>{ if(!v) fbSet("cultos",  INIT_CULTOS);   });
    fbGet("favs",    null).then(v=>{ if(!v) fbSet("favs",    INIT_FAVS);     });
    return ()=>{ unCant(); unMus(); unCult(); unFavs(); clearTimeout(fallback); };
  }, []);

  useEffect(()=>{
    if (!loaded.current.cant) return;
    if (fromFb.current.cant) { fromFb.current.cant=false; return; }
    fbSet("cantores", cantores);
  }, [cantores]);

  useEffect(()=>{
    if (!loaded.current.mus) return;
    if (fromFb.current.mus) { fromFb.current.mus=false; return; }
    fbSet("musicos", musicos);
  }, [musicos]);

  useEffect(()=>{
    if (!loaded.current.cult) return;
    if (fromFb.current.cult) { fromFb.current.cult=false; return; }
    fbSet("cultos", cultos);
  }, [cultos]);

  useEffect(()=>{
    if (!loaded.current.favs) return;
    if (fromFb.current.favs) { fromFb.current.favs=false; return; }
    fbSet("favs", favs);
  }, [favs]);

  useEffect(()=>{ try{ localStorage.setItem("esc_theme",themeKey); }catch{} },[themeKey]);

  const accent=THEMES[themeKey]||THEMES.gold;

  const [tab,       setTab]     = useState("calendario");
  const [calView,   setCalView] = useState("month");
  const [calY,      setCalY]    = useState(()=>new Date().getFullYear());
  const [calM,      setCalM]    = useState(()=>new Date().getMonth());
  const [selId,     setSelId]   = useState(null);
  const [playL,     setPlayL]   = useState(null);
  const [presentId, setPId]     = useState(null);
  const [openCards, setOpenCards] = useState({});
  const toggleCard = id => setOpenCards(p=>({...p,[id]:!p[id]}));
  const [editMI,    setEditMI]  = useState(null);
  const [showAddC,  setShowAddC]= useState(false);
  const [showAddM,  setShowAddM]= useState(false);
  const [newCantN,  setNewCantN]= useState("");
  const [newMusN,   setNewMusN] = useState("");
  const [newMusInst,setNewMusInst]=useState("Bateria");
  const [newCultoF, setNCF]     = useState(null);
  const [newLF,     setNLF]     = useState(null);
  const [showFavPk, setFavPk]   = useState(false);
  const [showTheme, setShowTheme]= useState(false);
  const [showMenu,  setShowMenu] = useState(false);
  const [sq,        setSq]      = useState("");
  const [sLoad,     setSLoad]   = useState(false);
  const [sRes,      setSRes]    = useState([]);
  const [sErr,      setSErr]    = useState("");
  const [paste,     setPaste]   = useState("");
  const [toast,     setToast]   = useState(null);
  const toastT=useRef(null);

  const today=new Date().toISOString().split("T")[0];

  const showToast=(msg,ok=true)=>{
    clearTimeout(toastT.current);
    setToast({msg,ok});
    toastT.current=setTimeout(()=>setToast(null),2600);
  };

  const updC=c=>{setCultos(p=>p.map(x=>x.id===c.id?c:x)); setSelId(c.id);};
  const getC=id=>cultos.find(c=>c.id===id);
  const sel=selId?getC(selId):null;

  const calCells=()=>{
    const out=[]; const fdm=new Date(calY,calM,1).getDay(); const dim=new Date(calY,calM+1,0).getDate();
    for(let i=0;i<fdm;i++) out.push(null);
    for(let d=1;d<=dim;d++){
      const ds=calY+"-"+String(calM+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
      out.push({d,ds});
    }
    return out;
  };

  const proximos=cultos.map(c=>({...c,diff:daysUntil(c.data)}))
    .filter(c=>c.diff!==null).sort((a,b)=>a.data.localeCompare(b.data)).slice(0,4);

  const doAddCulto=()=>{
    const f=newCultoF;
    if(!f?.data||!f?.tipo) return;
    if(f.modo==="campanha"){
      // Gera N cultos semanais a partir da data inicial
      const reps=parseInt(f.repeticoes)||1;
      const novos=[];
      for(let i=0;i<reps;i++){
        const d=new Date(f.data+"T12:00");
        d.setDate(d.getDate()+i*7);
        const ds=d.toISOString().split("T")[0];
        const num=reps>1?" ("+(i+1)+"/"+reps+")":"";
        novos.push({...mkC(ds,f.tipo,f.tema||(f.campanha||""),f.campanha||""),
          obs:f.campanha?(f.campanha+(f.tema?" — "+f.tema:"")):"" });
        // set tema no obs para aparecer visível
        novos[i].tema=(f.tema||"")+(num);
        novos[i].campanha=f.campanha||"";
      }
      setCultos(p=>[...p,...novos]);
      setNCF(null);
      showToast(reps>1?reps+" cultos da campanha criados ✓":"Culto criado ✓");
    } else {
      setCultos(p=>[...p,mkC(f.data,f.tipo,f.tema||"","")]);
      setNCF(null); showToast("Culto adicionado ✓");
    }
  };
  const doDelCulto=id=>{
    setCultos(p=>p.filter(c=>c.id!==id)); setSelId(null); setTab("calendario"); showToast("Culto removido",false);
  };
  const toggleCantor=(cid,nome)=>{
    const c=getC(cid); if(!c)return;
    updC({...c,cantores:c.cantores.includes(nome)?c.cantores.filter(n=>n!==nome):[...c.cantores,nome]});
  };
  const toggleMusico=(cid,nome)=>{
    const c=getC(cid); if(!c)return;
    const ms=c.musicos||[];
    updC({...c,musicos:ms.includes(nome)?ms.filter(n=>n!==nome):[...ms,nome]});
  };
  const doAddLouvor=cid=>{
    if(!newLF?.titulo)return;
    const c=getC(cid); if(!c)return;
    const nl=mkL(newLF.titulo,newLF.artista||"",newLF.ytUrl||"",newLF.tom||"");
    nl.cifra=newLF.cifra||""; nl.obs=newLF.obs||"";
    updC({...c,louvores:[...c.louvores,nl]});
    setNLF(null); showToast("Louvor adicionado ✓");
  };
  const addFavToCulto=(cid,fav)=>{
    const c=getC(cid); if(!c)return;
    updC({...c,louvores:[...c.louvores,{...fav,id:uid()}]});
    setFavPk(false); showToast('"'+fav.titulo+'" adicionado ✓');
  };
  const doRemLouvor=(cid,lid)=>{
    const c=getC(cid); if(!c)return;
    updC({...c,louvores:c.louvores.filter(l=>l.id!==lid)}); showToast("Removido",false);
  };
  const moveLouvor=(cid,idx,dir)=>{
    const c=getC(cid); if(!c)return;
    const arr=[...c.louvores]; const ni=idx+dir;
    if(ni<0||ni>=arr.length)return;
    [arr[idx],arr[ni]]=[arr[ni],arr[idx]]; updC({...c,louvores:arr});
  };
  const isFav=l=>favs.some(f=>f.titulo===l.titulo&&f.artista===l.artista);
  const toggleFav=l=>{
    const ex=favs.find(f=>f.titulo===l.titulo&&f.artista===l.artista);
    if(ex){setFavs(p=>p.filter(f=>f.id!==ex.id)); showToast("Removido dos favoritos",false);}
    else{setFavs(p=>[...p,{...l,id:uid()}]); showToast("★ Adicionado aos favoritos");}
  };
  const toggleLembrete=cid=>{
    const c=getC(cid); if(!c)return;
    updC({...c,lembrete:!c.lembrete}); showToast(!c.lembrete?"🔔 Lembrete ativado":"Lembrete desativado");
  };
  const saveCantorEdit=updated=>{
    const oldNome=cantores[editCI]?.nome;
    setCantores(p=>p.map((c,i)=>i===editCI?updated:c));
    if(oldNome!==updated.nome) setCultos(p=>p.map(c=>({...c,cantores:c.cantores.map(n=>n===oldNome?updated.nome:n)})));
    setEditCI(null); showToast("Cantor atualizado ✓");
  };
  const deleteCantorAt=idx=>{
    const nome=cantores[idx]?.nome;
    setCantores(p=>p.filter((_,i)=>i!==idx));
    setCultos(p=>p.map(c=>({...c,cantores:c.cantores.filter(n=>n!==nome)})));
    setEditCI(null); showToast("Cantor removido",false);
  };
  const doAddCantor=()=>{
    if(!newCantN.trim())return;
    setCantores(p=>[...p,mkCantor(newCantN.trim())]);
    setNewCantN(""); setShowAddC(false); showToast("Cantor adicionado ✓");
  };
  const doAddMusico=()=>{
    if(!newMusN.trim())return;
    setMusicos(p=>[...p,{id:uid(),nome:newMusN.trim(),instrumento:newMusInst,emoji:
      newMusInst==="Bateria"?"🥁":newMusInst==="Guitarra"?"🎸":newMusInst==="Teclado"?"🎹":
      newMusInst==="Contra Baixo"?"🎵":newMusInst==="Violão"?"🎸":"🎵",louvoresFav:[]}]);
    setNewMusN(""); setShowAddM(false); showToast("Músico adicionado ✓");
  };
  const saveMusicoEdit=(updated,idx)=>{
    const oldNome=musicos[idx]?.nome;
    setMusicos(p=>p.map((m,i)=>i===idx?updated:m));
    if(oldNome!==updated.nome) setCultos(p=>p.map(c=>({...c,musicos:(c.musicos||[]).map(n=>n===oldNome?updated.nome:n)})));
    setEditMI(null); showToast("Músico atualizado ✓");
  };
  const deleteMusicoAt=idx=>{
    const nome=musicos[idx]?.nome;
    setMusicos(p=>p.filter((_,i)=>i!==idx));
    setCultos(p=>p.map(c=>({...c,musicos:(c.musicos||[]).filter(n=>n!==nome)})));
    setEditMI(null); showToast("Músico removido",false);
  };
  const doSearch=async()=>{
    if(!sq.trim())return;
    setSLoad(true); setSRes([]); setSErr("");

    catch{ setSErr("Erro na busca."); }
    setSLoad(false);
  };
  const useResult=r=>{
    const url=r.ytUrl||(r.ytId?"https://www.youtube.com/watch?v="+r.ytId:"");
    setNLF({titulo:r.titulo,artista:r.artista,ytUrl:url,tom:r.tom||"",cifra:r.cifra||"",obs:""});

  };
  const copyCultoList=c=>{
    const lines=[
      "📋 "+CC[c.tipo].label+" — "+fmtDate(c.data),
      c.cantores.length?"🎤 Cantores: "+c.cantores.join(", "):"",
      (c.musicos||[]).length?"🎸 Músicos: "+c.musicos.join(", "):"",
      c.louvores.length?"\n🎵 Louvores":"",
      ...c.louvores.map((l,i)=>"  "+(i+1)+". "+l.titulo+(l.artista?" — "+l.artista:"")+(l.tom?" ("+l.tom+")":"")+(l.cifra?" | "+l.cifra:"")),
    ].filter(Boolean).join("\n");
    navigator.clipboard.writeText(lines).then(()=>showToast("📋 Copiado!")).catch(()=>showToast("Erro",false));
  };

  const bGold={background:"linear-gradient(135deg,"+accent.accent+","+accent.light+")",color:"#0F0F1A",
    border:"none",borderRadius:10,padding:"9px 18px",cursor:"pointer",fontWeight:700,fontSize:13,
    fontFamily:"inherit",whiteSpace:"nowrap",boxShadow:"0 4px 14px rgba("+accent.rgb+",0.3)",
    textDecoration:"none",display:"inline-block"};
  const bGhost={background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
    color:"rgba(255,255,255,0.55)",borderRadius:8,padding:"8px 15px",cursor:"pointer",fontSize:13,fontFamily:"inherit"};
  const bDanger={background:"rgba(224,123,138,0.1)",border:"1px solid rgba(224,123,138,0.3)",
    color:"#E07B8A",borderRadius:8,padding:"7px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit"};

  /* ─ RENDER ─ */

  // Tela de carregamento enquanto conecta ao Firebase
  if (!fbReady) return (
    <div style={{minHeight:"100vh",background:"#0F0F1A",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",gap:16,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <style>{"@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap');"}</style>
      <div style={{fontSize:48,animation:"spin 1.2s linear infinite",display:"inline-block"}}>✝</div>
      <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:22,fontWeight:700,color:"#EAE8F2"}}>Banda Aviva</div>
      <div style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>Conectando ao banco de dados...</div>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#0F0F1A",color:"#EAE8F2",fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <style>{[
        "@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap');",
        "*{box-sizing:border-box;margin:0;padding:0;}",
        "::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:rgba("+accent.rgb+",0.3);border-radius:2px;}",
        "input,select,textarea{font-family:inherit;color:#EAE8F2;}",
        "input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.18);}",
        "option{background:#1a1a2e;}",
        "@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}",
        "@keyframes spin{to{transform:rotate(360deg)}}",
        "@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}",
        ".yt-w:hover .yt-ov{opacity:1!important;}",
        ".htab:hover{color:"+accent.accent+"!important;}",
        ".pill:hover{filter:brightness(1.12);}",

            {sErr&&<div style={{background:"rgba(224,123,138,0.08)",border:"1px solid rgba(224,123,138,0.25)",color:"#E07B8A",borderRadius:10,padding:"10px 15px",fontSize:13,marginBottom:16}}>{sErr}</div>}
            {sRes.length>0&&(
              <>
                <div style={{fontSize:10,letterSpacing:2,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",fontWeight:600,marginBottom:12}}>{sRes.length} resultados</div>

                    const id   = r.ytId || getYTId(r.ytUrl||"");

                          <div style={{fontSize:14,fontWeight:600,color:"#EAE8F2",marginBottom:2}}>{r.titulo}</div>
                          <div style={{fontSize:12,color:"rgba(255,255,255,0.38)",marginBottom:8}}>{r.artista}</div>

                              <span style={{fontSize:9,letterSpacing:1.5,color:"#C9A84C",fontWeight:700,textTransform:"uppercase"}}>CIFRA</span>
                              <span style={{fontSize:13,fontWeight:700,color:"#EAE8F2"}}>{r.cifra}</span>
                            </div>
                          )}
                          <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                            <TomTag tom={r.tom}/>
                            {id&&<button onClick={()=>setPlayL({...r,ytUrl:link})} style={{background:"rgba(204,0,0,0.12)",border:"1px solid rgba(204,0,0,0.25)",color:"#ff7b7b",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>▶ Ver</button>}
                            <button onClick={()=>toggleFav(r)} style={{background:isFav(r)?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.05)",border:isFav(r)?"1px solid rgba(201,168,76,0.35)":"1px solid rgba(255,255,255,0.1)",color:isFav(r)?"#C9A84C":"rgba(255,255,255,0.4)",borderRadius:20,padding:"3px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700}}>{isFav(r)?"★":"☆"} Fav</button>
                            <button onClick={()=>useResult(r)} style={{background:"rgba(107,191,163,0.12)",border:"1px solid rgba(107,191,163,0.3)",color:"#6BBFA3",borderRadius:20,padding:"3px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700}}>+ Culto</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
            {/* Colar link manual */}
            <div style={{background:"#161625",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"18px"}}>

              <Fld value={paste} placeholder="https://youtu.be/..." onChange={e=>setPaste(e.target.value)}/>
              {getYTId(paste)?(
                <div style={{marginTop:14}}>
                  <div style={{position:"relative",width:"100%",paddingBottom:"56.25%",background:"#000",borderRadius:12,overflow:"hidden",marginBottom:12}}>
                    <iframe src={"https://www.youtube.com/embed/"+getYTId(paste)+"?rel=0"} title="YouTube"
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                      allowFullScreen style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}}/>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button onClick={()=>{setNLF({titulo:sRes[0]?.titulo||"",artista:sRes[0]?.artista||"",ytUrl:paste,tom:sRes[0]?.tom||"",cifra:sRes[0]?.cifra||"",obs:""});setTab("culto");showToast("Link adicionado — salve no culto");}}
                      style={{...bGold}}>+ Usar no Culto</button>
                    <button onClick={()=>toggleFav({titulo:sRes[0]?.titulo||"",artista:sRes[0]?.artista||"",ytUrl:paste,tom:sRes[0]?.tom||"",cifra:sRes[0]?.cifra||"",obs:""})}
                      style={{background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.3)",color:"#C9A84C",borderRadius:10,padding:"9px 16px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:700}}>★ Favoritar</button>
                  </div>
                </div>
              ):paste.length>5&&(
                <div style={{marginTop:10,fontSize:12,color:"rgba(224,123,138,0.8)"}}>⚠ Link não reconhecido.</div>
              )}
            </div>
          </div>
        )}



        {/* ═ FAVORITOS ═ */}
        {tab==="favoritos"&&(
          <div style={{animation:"fadeUp 0.3s ease"}}>
            <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:22,flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontSize:10,letterSpacing:2.5,color:accent.accent,textTransform:"uppercase",fontWeight:600,marginBottom:5}}>Banco de Louvores</div>
                <h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:30,fontWeight:700,color:"#EAE8F2",margin:0}}>Favoritos</h1>
              </div>
            </div>
            {favs.length===0&&(
              <div style={{textAlign:"center",padding:"60px 0",opacity:0.3}}>
                <div style={{fontSize:40,marginBottom:10}}>★</div>
                <div style={{fontSize:15,color:"rgba(255,255,255,0.4)"}}>Nenhum favorito ainda</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.25)",marginTop:5}}>Adicione usando ★ na busca</div>
              </div>

                return (
                  <div key={l.id} className="frow" style={{background:"#161625",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,overflow:"hidden",transition:"background 0.15s"}}>

                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:6}}>

                          <div style={{fontSize:14,fontWeight:600,color:"#EAE8F2",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.titulo}</div>
                          <div style={{fontSize:12,color:"rgba(255,255,255,0.38)"}}>{l.artista}</div>
                        </div>
                        <button onClick={()=>setFavs(p=>p.filter(f=>f.id!==l.id))} style={{background:"none",border:"none",color:"rgba(224,123,138,0.4)",cursor:"pointer",fontSize:15,padding:0,flexShrink:0}}>✕</button>
                      </div>
                      {l.cifra&&(
                        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8,padding:"5px 9px",background:"rgba(255,255,255,0.04)",borderRadius:6}}>
                          <span style={{fontSize:9,letterSpacing:1.5,color:"#C9A84C",fontWeight:700,textTransform:"uppercase"}}>CIFRA</span>
                          <span style={{fontSize:13,fontWeight:700,color:"#EAE8F2"}}>{l.cifra}</span>
                        </div>
                      )}
                      <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                        <TomTag tom={l.tom}/>
                        {l.ytUrl&&<a href={l.ytUrl} target="_blank" rel="noreferrer" style={{background:"rgba(204,0,0,0.12)",border:"1px solid rgba(204,0,0,0.25)",color:"#ff7b7b",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,textDecoration:"none"}}>▶ YT</a>}
                        <button onClick={()=>{setNLF({titulo:l.titulo,artista:l.artista,ytUrl:l.ytUrl||"",tom:l.tom,cifra:l.cifra,obs:l.obs||""});setTab("culto");showToast("Selecionado — salve no culto");}} style={{background:"rgba(107,191,163,0.12)",border:"1px solid rgba(107,191,163,0.3)",color:"#6BBFA3",borderRadius:20,padding:"3px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700}}>+ Culto</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <Ovl onClose={()=>setNCF(null)} wide>
          <MH title={newCultoF.modo==="campanha"?"🔥 Nova Campanha":"➕ Novo Culto"} onClose={()=>setNCF(null)}/>

          {/* Modo toggle */}
          <div style={{display:"flex",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,overflow:"hidden"}}>
            {[{v:"unico",label:"Culto Único",icon:"📅"},{v:"campanha",label:"Campanha / Série",icon:"🔥"}].map(opt=>(
              <button key={opt.v} onClick={()=>setNCF(f=>({...f,modo:opt.v}))} style={{
                flex:1,padding:"10px 8px",border:"none",cursor:"pointer",fontFamily:"inherit",
                fontSize:13,fontWeight:newCultoF.modo===opt.v?700:400,
                background:newCultoF.modo===opt.v?"rgba("+accent.rgb+",0.2)":"transparent",
                color:newCultoF.modo===opt.v?accent.accent:"rgba(255,255,255,0.45)",

                {opt.icon} {opt.label}
              </button>
            ))}
          </div>

          {/* Tipo de culto */}
          <Fld label="Tipo de Culto" as="select" value={newCultoF.tipo} onChange={e=>setNCF(f=>({...f,tipo:e.target.value}))}>

          {/* Tema do culto */}
          <Fld label="Tema do Culto (opcional)" value={newCultoF.tema||""} placeholder="Ex: Fé que move montanhas..."
            onChange={e=>setNCF(f=>({...f,tema:e.target.value}))}/>

          {newCultoF.modo==="campanha"?(
            <>
              {/* Nome da campanha */}
              <Fld label="Nome da Campanha *" value={newCultoF.campanha||""} placeholder="Ex: Campanha da Fé, Semana Santa..."
                onChange={e=>setNCF(f=>({...f,campanha:e.target.value}))}/>

              {/* Data do PRIMEIRO culto */}
              <Fld label="Data do 1º Culto *" type="date" value={newCultoF.data}
                onChange={e=>setNCF(f=>({...f,data:e.target.value}))}/>

              {/* Quantas repetições */}
              <div>
                <label style={{fontSize:10,letterSpacing:1.5,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:8}}>
                  Quantos cultos na campanha? *
                </label>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {[2,3,4,5,6,7,8].map(n=>(
                    <button key={n} onClick={()=>setNCF(f=>({...f,repeticoes:n}))} style={{
                      width:48,height:48,borderRadius:10,border:"none",cursor:"pointer",
                      fontFamily:"inherit",fontSize:15,fontWeight:700,
                      background:(newCultoF.repeticoes||4)===n?"rgba("+accent.rgb+",0.25)":"rgba(255,255,255,0.06)",
                      color:(newCultoF.repeticoes||4)===n?accent.accent:"rgba(255,255,255,0.5)",
                      outline:(newCultoF.repeticoes||4)===n?"2px solid "+accent.accent:"none",
                      transition:"all 0.15s"}}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>

              {/* Preview das datas */}
              {newCultoF.data&&(
                <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"12px 14px"}}>
                  <div style={{fontSize:10,letterSpacing:1.5,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,marginBottom:8}}>
                    📅 Cultos que serão criados
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {Array.from({length:newCultoF.repeticoes||4},(_,i)=>{
                      const d=new Date(newCultoF.data+"T12:00");
                      d.setDate(d.getDate()+i*7);
                      const ds=d.toISOString().split("T")[0];
                      const cf=CC[newCultoF.tipo];
                      return (
                        <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:22,height:22,borderRadius:6,background:"rgba("+cf.rgb+",0.15)",
                            border:"1px solid rgba("+cf.rgb+",0.3)",display:"flex",alignItems:"center",
                            justifyContent:"center",fontSize:10,fontWeight:700,color:cf.color,flexShrink:0}}>{i+1}</div>
                          <span style={{fontSize:13,color:"#EAE8F2",fontWeight:500}}>{fmtDate(ds)}</span>
                          <span style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>
                            {["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d.getDay()]}
                          </span>
                          {newCultoF.tema&&<span style={{fontSize:11,color:cf.color,fontStyle:"italic"}}>
                            {newCultoF.tema} ({i+1}/{newCultoF.repeticoes||4})
                          </span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          ):(
            /* Culto único */
            <Fld label="Data *" type="date" value={newCultoF.data} onChange={e=>setNCF(f=>({...f,data:e.target.value}))}/>

          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
            <button style={bGhost} onClick={()=>setNCF(null)}>Cancelar</button>
            <button style={bGold} onClick={doAddCulto}>
              {newCultoF.modo==="campanha"
                ? "🔥 Criar "+(newCultoF.repeticoes||4)+" Cultos"
                : "Criar Culto"}
            </button>
          </div>
        </Ovl>
      )}

      {/* Editar cantor */}
      {editCI!==null&&cantores[editCI]&&(
        <CantorModal
          cantor={cantores[editCI]} idx={editCI} cultos={cultos}
          onSave={saveCantorEdit} onDelete={deleteCantorAt} onClose={()=>setEditCI(null)}
          bGold={bGold} bGhost={bGhost} bDanger={bDanger}
        />
      )}

      {/* Adicionar músico */}
      {showAddM&&(
        <Ovl onClose={()=>setShowAddM(false)}>
          <MH title="Novo Músico" onClose={()=>setShowAddM(false)}/>

            <button style={bGhost} onClick={()=>setShowAddM(false)}>Cancelar</button>
            <button style={bGold} onClick={doAddMusico}>Adicionar</button>
          </div>
        </Ovl>
      )}

      {/* Editar músico */}
      {editMI!==null&&musicos[editMI]&&(
        <Ovl onClose={()=>setEditMI(null)}>
          <MH title="Editar Músico" onClose={()=>setEditMI(null)}/>
          <MusicoEditForm
            musico={musicos[editMI]}
            idx={editMI}
            accent={accent}
            bGold={bGold} bGhost={bGhost} bDanger={bDanger}

            onClose={()=>setEditMI(null)}

      {/* Adicionar cantor */}
      {showAddC&&(
        <Ovl onClose={()=>setShowAddC(false)}>

          <Fld label="Nome" value={newCantN} placeholder="Nome do cantor" onChange={e=>setNewCantN(e.target.value)}/>

            <button style={bGhost} onClick={()=>{setShowAddC(false);setNewCantN("");}}>Cancelar</button>
            <button style={bGold} onClick={doAddCantor}>Adicionar</button>
          </div>
        </Ovl>

      {/* Play louvor — player embutido */}
      {playL&&(
        <Ovl onClose={()=>setPlayL(null)} wide>
          <MH title={playL.titulo} sub={playL.artista} onClose={()=>setPlayL(null)}/>
          {getYTId(playL.ytUrl||"")?(
            <div style={{position:"relative",width:"100%",paddingBottom:"56.25%",background:"#000",borderRadius:12,overflow:"hidden"}}>
              <iframe
                src={"https://www.youtube.com/embed/"+getYTId(playL.ytUrl)+"?autoplay=1&rel=0"}
                title={playL.titulo}
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowFullScreen
                style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}}
              />
            </div>
          ):(
            <div style={{textAlign:"center",padding:"32px 0",color:"rgba(255,255,255,0.25)",fontSize:13}}>
              Sem vídeo disponível
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            {playL.tom&&(
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",
                background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.25)",borderRadius:10}}>
                <span style={{fontSize:9,letterSpacing:1.5,color:"#C9A84C",fontWeight:700,textTransform:"uppercase"}}>TOM</span>
                <span style={{fontSize:18,fontWeight:700,color:"#C9A84C"}}>{playL.tom}</span>
              </div>
            )}
            {playL.cifra&&(
              <div style={{flex:1,display:"flex",alignItems:"center",gap:10,padding:"8px 14px",
                background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10}}>
                <span style={{fontSize:9,letterSpacing:1.5,color:"#C9A84C",fontWeight:700,textTransform:"uppercase",flexShrink:0}}>CIFRA</span>
                <span style={{fontSize:15,fontWeight:700,color:"#EAE8F2"}}>{playL.cifra}</span>
              </div>
            )}
            {playL.ytUrl&&(
              <a href={playL.ytUrl} target="_blank" rel="noreferrer"
                style={{background:"rgba(204,0,0,0.15)",border:"1px solid rgba(204,0,0,0.3)",
                  color:"#ff7b7b",borderRadius:10,padding:"8px 14px",textDecoration:"none",
                  fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>↗ Abrir no YouTube</a>
            )}
          </div>
        </Ovl>
      )}

      {/* Favoritos picker */}
      {showFavPk&&sel&&(
        <Ovl onClose={()=>setFavPk(false)} wide>
          <MH title="Adicionar dos Favoritos" onClose={()=>setFavPk(false)}/>
          {favs.length===0&&<p style={{color:"rgba(255,255,255,0.35)",fontSize:13}}>Nenhum favorito ainda.</p>}
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {favs.map(f=>(
              <div key={f.id} className="frow" onClick={()=>addFavToCulto(sel.id,f)} style={{
                display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                borderRadius:9,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",
                transition:"background 0.15s",cursor:"pointer"}}>
                {getYTId(f.ytUrl||"")&&<YTThumb ytid={getYTId(f.ytUrl)} small/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#EAE8F2",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.titulo}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{f.artista}</div>
                </div>
                <TomTag tom={f.tom}/>
                <button style={{...bGold,padding:"5px 12px",fontSize:12,boxShadow:"none"}}>+ Add</button>
              </div>
            ))}
          </div>
        </Ovl>
      )}

      {/* Tema */}
      {showTheme&&(
        <Ovl onClose={()=>setShowTheme(false)}>
          <MH title="🎨 Tema da Igreja" onClose={()=>setShowTheme(false)}/>
          <p style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginTop:-6}}>Escolha a cor principal do app</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
            {Object.entries(THEMES).map(([k,v])=>(
              <button key={k} onClick={()=>{setThemeKey(k);setShowTheme(false);showToast("Tema "+v.name+" ✓");}} style={{
                display:"flex",flexDirection:"column",alignItems:"center",gap:7,padding:"14px 8px",borderRadius:12,cursor:"pointer",
                border:themeKey===k?"2px solid "+v.accent:"2px solid rgba(255,255,255,0.08)",
                background:themeKey===k?"rgba("+v.rgb+",0.12)":"rgba(255,255,255,0.03)",transition:"all 0.2s"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,"+v.accent+","+v.light+")",boxShadow:"0 4px 12px rgba("+v.rgb+",0.4)"}}/>
                <span style={{fontSize:11,color:themeKey===k?v.accent:"rgba(255,255,255,0.45)",fontWeight:themeKey===k?700:400}}>{v.name}</span>
              </button>
            ))}
          </div>
        </Ovl>
      )}

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:24,right:20,zIndex:9999,padding:"11px 18px",borderRadius:12,
          background:toast.ok?"rgba(76,175,125,0.97)":"rgba(224,123,138,0.97)",
          color:"#0F0F1A",fontWeight:700,fontSize:13,fontFamily:"inherit",
          boxShadow:"0 8px 28px rgba(0,0,0,0.5)",animation:"toastIn 0.25s ease",maxWidth:"calc(100vw - 40px)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>

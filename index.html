// Salva um documento no Firestore
async function fbSet(colecao, dados) {
  try { await setDoc(doc(db, "app", colecao), { dados: JSON.stringify(dados) }); } catch(e) { console.error("fbSet",e); }
}
// Escuta mudanças em tempo real
function fbListen(colecao, cb) {
  return onSnapshot(doc(db, "app", colecao), snap => {
    if (snap.exists()) {
      try { cb(JSON.parse(snap.data().dados)); } catch {}
    }
  });
}
// Carrega uma vez (para inicialização)
async function fbGet(colecao, fallback) {
  try {
    const snap = await getDoc(doc(db, "app", colecao));
    if (snap.exists()) return JSON.parse(snap.data().dados);
  } catch {}
  return fallback;
}
